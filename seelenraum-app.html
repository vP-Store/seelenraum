  {t:"Traumtagebuch führen",s:"Erinnerung stärken",txt:"Leg Stift und Papier neben dein Bett und schreibe direkt nach dem Aufwachen auf, was du noch weißt – auch Bruchstücke. Mit der Zeit erinnerst du dich immer klarer.",affirm:"Ich höre auf die Bilder meiner Nacht."},
  {t:"Wiederkehrende Träume",s:"ein Muster erkennen",txt:"Träume, die sich wiederholen, tragen oft eine Botschaft, die noch gehört werden will. Frag dich sanft: Welches Thema kehrt hier zurück?",affirm:"Ich darf erkennen, was sich zeigen will."},
  {t:"Symbole deuten",s:"Wasser, Fallen, Fliegen",txt:"Wasser steht oft für Gefühle, Fallen für Kontrollverlust, Fliegen für Freiheit. Wichtig ist vor allem, was das Symbol für dich persönlich bedeutet.",affirm:"Meine innere Weisheit kennt die Bedeutung."},
  {t:"Albträume verwandeln",s:"Angst entmachten",txt:"Stell dir den Albtraum am Tag noch einmal vor – und gib ihm bewusst ein gutes Ende. So nimmst du ihm seine Macht.",affirm:"Ich gestalte meine inneren Bilder neu."},
  {t:"Klarträume einladen",s:"bewusst träumen",txt:"Sag dir vor dem Einschlafen ruhig: Heute Nacht erkenne ich, dass ich träume. Mit Übung wirst du im Traum wacher.",affirm:"Ich bin wach, auch im Traum."}]},
 schattenarbeit:{name:"Schattenarbeit",img:"bg-schattenarbeit.jpg",he:"Licht ins Verborgene",sub:"deine ungeliebten Anteile heilen",was:"Der Schatten ist alles, was wir an uns verstecken oder ablehnen. Schattenarbeit heißt, diesen Teilen mit Neugier statt Urteil zu begegnen – denn was wir annehmen, verliert seine Macht über uns.",nutzen:"Geh behutsam vor und nur so tief, wie es dir guttut. Nutze die Impulse, um hinzuschauen, und sei dabei dein eigener freundlicher Begleiter.",items:[
  {t:"Trigger als Wegweiser",s:"was dich reizt, zeigt dir etwas",txt:"Was dich an anderen besonders stört, lebt oft unerkannt auch in dir. Frag dich: Was berührt das in mir?",affirm:"Meine Reaktionen zeigen mir den Weg nach innen."},
  {t:"Den inneren Kritiker treffen",s:"die strenge Stimme",txt:"Hör hin, wie du innerlich mit dir sprichst. Würdest du so auch mit einem geliebten Menschen reden?",affirm:"Ich begegne mir mit Güte statt Härte."},
  {t:"Verdrängte Gefühle zulassen",s:"Wut, Neid, Scham",txt:"Auch unbequeme Gefühle dürfen da sein. Sie tragen Informationen – nicht um ausgelebt, sondern um gefühlt zu werden.",affirm:"Alle meine Gefühle dürfen sein."},
  {t:"Projektionen zurücknehmen",s:"das Außen als Spiegel",txt:"Was du im Außen heftig bewertest, sagt oft etwas über dich. Hol den Blick liebevoll zu dir zurück.",affirm:"Ich nehme zurück, was zu mir gehört."},
  {t:"Den Schatten umarmen",s:"Integration",txt:"Stell dir den abgelehnten Teil als jüngere Version von dir vor und sag ihr: Du gehörst dazu. Heilung beginnt mit Annahme.",affirm:"Ich bin ganz – mit Licht und Schatten."}]},
 "inneres-kind":{name:"Inneres Kind",img:"bg-inneres-kind.jpg",he:"Zurück zu dir",sub:"dein inneres Kind heilen und nähren",was:"In dir lebt das Kind, das du einmal warst – mit seinen Sehnsüchten und Verletzungen. Diesem Teil zuzuhören und ihm zu geben, was es damals brauchte, heilt alte Wunden.",nutzen:"Begegne dir mit der Wärme, die du dir als Kind gewünscht hättest. Die Impulse helfen dir, Kontakt aufzunehmen und für dich zu sorgen.",items:[
  {t:"Kontakt aufnehmen",s:"Hallo, da bist du",txt:"Schließe die Augen und stell dir dich als Kind vor. Begrüße es freundlich und frag: Wie geht es dir?",affirm:"Ich bin für mein inneres Kind da."},
  {t:"Was hat gefehlt?",s:"alte Bedürfnisse",txt:"Frag dein inneres Kind, was es damals gebraucht hätte – Schutz, Trost, Erlaubnis zu spielen. Heute kannst du es ihm schenken.",affirm:"Ich gebe mir, was ich früher brauchte."},
  {t:"Wieder spielen",s:"Leichtigkeit",txt:"Tu heute etwas einfach aus Freude, ohne Zweck – malen, tanzen, draußen sein. Dein inneres Kind lebt vom Spiel.",affirm:"Ich darf spielen und leicht sein."},
  {t:"Trost spenden",s:"Halt geben",txt:"Wenn du verletzt bist, leg eine Hand aufs Herz und sprich mit dir wie mit einem traurigen Kind: Ich bin bei dir.",affirm:"Ich tröste mich liebevoll."},
  {t:"Erlaubnisse geben",s:"neue Botschaften",txt:"Sag dir die Sätze, die du als Kind gebraucht hättest: Du bist genug. Du darfst Fehler machen. Du bist geliebt.",affirm:"Ich bin willkommen, genau so wie ich bin."}]},
 tarot:{name:"Tarot & Orakel",img:"bg-tarot.jpg",he:"Spiegel der Seele",sub:"Karten als Tor zu deiner Intuition",was:"Tarot- und Orakelkarten sagen nicht die Zukunft voraus – sie sind ein Spiegel. Ihre Bilder bringen Gedanken und Gefühle an die Oberfläche, die in dir schon da sind.",nutzen:"Formuliere eine offene Frage, atme durch und lass ein Bild auf dich wirken. Nutze die Deutung als Anstoß, nicht als Urteil. Zum Ziehen einer Botschaft gibt es auch den Orakel-Bereich.",items:[
  {t:"Die richtige Frage",s:"offen statt ja/nein",txt:"Statt einer Ja-oder-Nein-Frage frag lieber: Was darf ich beachten? Offene Fragen öffnen auch offene Antworten.",affirm:"Ich stelle Fragen, die mich weiterführen."},
  {t:"Tageskarte",s:"ein Impuls für heute",txt:"Zieh morgens eine Karte als Thema für den Tag. Am Abend schau, wo sie dir begegnet ist.",affirm:"Ich gehe achtsam durch meinen Tag."},
  {t:"Drei Karten: dein Weg",s:"gestern – heute – morgen",txt:"Lege drei Karten für Vergangenheit, Gegenwart und Möglichkeit. Sie zeigen eine Bewegung, keinen festen Plan.",affirm:"Ich erkenne den roten Faden in meinem Weg."},
  {t:"Intuitiv deuten",s:"erst fühlen, dann lesen",txt:"Schau die Karte an und spür, was sie in dir auslöst, bevor du eine Bedeutung nachliest. Dein erstes Gefühl zählt.",affirm:"Ich vertraue meinem ersten Eindruck."},
  {t:"Karten als Ritual",s:"Raum schaffen",txt:"Mach das Legen zu einem ruhigen Moment: Kerze an, tief atmen, präsent sein. So wird die Deutung klarer.",affirm:"Ich schaffe mir einen Raum der Klarheit."}]},
 affirmationen:{name:"Affirmationen",img:"bg-affirmationen.jpg",he:"Worte, die formen",sub:"dein inneres Sprechen liebevoll ausrichten",was:"Affirmationen sind positive Sätze im Präsens, die du dir bewusst wiederholst. Mit der Zeit glaubt dein Gehirn, was es oft hört – auch von deiner eigenen Stimme.",nutzen:"Wähle einen Satz, der sich erreichbar anfühlt, und sprich ihn täglich mit Gefühl. Wirksam wird er durch Wiederholung, nicht durch Perfektion.",items:[
  {t:"Erreichbar formulieren",s:"sanft statt überzogen",txt:"Statt vollkommen angstfrei lieber: Ich lerne, mir zu vertrauen. Sätze, die du innerlich ablehnst, erzeugen Widerstand.",affirm:"Ich wachse in meinem eigenen Tempo."},
  {t:"Vor dem Spiegel",s:"in die eigenen Augen",txt:"Sprich deine Affirmation morgens vor dem Spiegel, sieh dir freundlich in die Augen. Niemand prägt dich so wie du selbst.",affirm:"Ich bin auf meiner Seite."},
  {t:"Mit Gefühl füllen",s:"fühlen statt aufsagen",txt:"Spür beim Sprechen, wie es wäre, dass der Satz wahr ist. Das Gefühl macht die Wirkung, nicht die Worte allein.",affirm:"Ich fühle die Wahrheit meiner Worte."},
  {t:"Negatives umdrehen",s:"vom Mangel zur Fülle",txt:"Hörst du einen harten Satz über dich, formuliere bewusst das freundliche Gegenteil. Übung verändert den Ton.",affirm:"Ich wandle Kritik in Freundlichkeit."},
  {t:"Affirmation des Tages",s:"einen Anker setzen",txt:"Wähle morgens einen Satz und lass ihn durch deinen Tag wandern – auf einem Zettel, als Erinnerung, im Atem.",affirm:"Mein Tag trägt eine liebevolle Absicht."}]},
 reinigung:{name:"Energetische Reinigung",img:"bg-reinigung.jpg",he:"Raum für Frisches",sub:"dich und deine Räume energetisch klären",was:"Energetische Reinigung ist ein Ritual, um Schweres loszulassen und Klarheit zu schaffen – im Raum und in dir. Der eigentliche Wert liegt darin, dass du deine Absicht ausrichtest.",nutzen:"Wähle eine Methode, die sich für dich stimmig anfühlt, und mach sie bewusst. Wichtig ist nicht die Technik, sondern die Haltung des Loslassens.",items:[
  {t:"Räuchern",s:"Rauch, der trägt",txt:"Verbrenne etwas Salbei, Palo Santo oder Kräuter und führe den Rauch achtsam durch den Raum, mit der Absicht, Schweres zu lösen.",affirm:"Ich lasse los, was nicht mehr zu mir gehört."},
  {t:"Lüften & Licht",s:"das Einfachste wirkt",txt:"Öffne die Fenster weit, lass frische Luft und Licht herein. Stell dir vor, wie alte Energie hinausströmt.",affirm:"Frische Energie darf einziehen."},
  {t:"Salz & Wasser",s:"klärende Elemente",txt:"Ein Bad oder Fußbad mit etwas Salz hilft, sich gereinigt und neu zu fühlen. Spür, wie das Wasser Altes mitnimmt.",affirm:"Ich bin klar und neu."},
  {t:"Aura abstreifen",s:"mit den Händen",txt:"Streiche mit den Händen sanft über deinen Körper, von oben nach unten, als streiftest du alles Schwere ab.",affirm:"Ich streife ab, was mich beschwert."},
  {t:"Klang zur Klärung",s:"Schale & Stimme",txt:"Ein Ton von Klangschale oder Stimme bringt stehende Energie in Bewegung. Lass den Klang durch den Raum gehen.",affirm:"Klang reinigt meinen Raum."}]},
 intuition:{name:"Intuition",img:"bg-intuition.jpg",he:"Die leise Stimme",sub:"deiner inneren Führung wieder vertrauen",was:"Intuition ist das Wissen, das ohne Nachdenken auftaucht – ein Gefühl im Bauch, ein klares Ja oder Nein. Sie ist eine Fähigkeit, die mit Übung stärker wird.",nutzen:"Werde still, damit du die leise Stimme hören kannst. Die Impulse helfen dir, sie vom lauten Grübeln zu unterscheiden und ihr zu folgen.",items:[
  {t:"Den Bauch befragen",s:"erste Reaktion",txt:"Vor einer Entscheidung spür kurz in den Bauch: Wird es weit und leicht, oder eng? Der Körper antwortet oft schneller als der Kopf.",affirm:"Ich vertraue meinem Bauchgefühl."},
  {t:"Stille zulassen",s:"Raum für Antworten",txt:"Intuition braucht Ruhe. Schalte öfter ab, geh spazieren, atme – in der Stille wird die innere Stimme hörbar.",affirm:"In der Stille finde ich meine Antworten."},
  {t:"Kopf oder Intuition?",s:"den Unterschied spüren",txt:"Angst redet schnell und laut, Intuition ruhig und klar. Lern, die beiden Stimmen auseinanderzuhalten.",affirm:"Ich erkenne meine klare innere Stimme."},
  {t:"Kleine Schritte üben",s:"im Alltag trainieren",txt:"Folge im Kleinen deiner Eingebung – welcher Weg, welches Buch, welcher Mensch. So baust du Vertrauen auf.",affirm:"Ich übe, mir selbst zu folgen."},
  {t:"Zeichen wahrnehmen",s:"das Leben spricht",txt:"Achte auf das, was dir wiederholt begegnet. Nimm es als sanften Hinweis, nicht als Befehl.",affirm:"Ich bin offen für die Hinweise des Lebens."}]},
 dankbarkeit:{name:"Dankbarkeit",img:"bg-dankbarkeit.jpg",he:"Fülle sehen",sub:"den Blick auf das Gute richten",was:"Dankbarkeit ist die Übung, das Gute bewusst wahrzunehmen. Sie verändert nicht dein Leben von außen, aber deinen Blick darauf – und damit dein Erleben.",nutzen:"Nimm dir täglich einen kleinen Moment, um zu würdigen, was schon da ist. Was wir würdigen, wächst.",items:[
  {t:"Drei gute Dinge",s:"jeden Abend",txt:"Nenne abends drei Dinge, die heute schön waren – auch ganz kleine. Mit der Zeit sucht dein Geist von selbst das Gute.",affirm:"Ich sehe das Gute in meinem Tag."},
  {t:"Dankbarkeit im Körper",s:"fühlen statt denken",txt:"Spür beim Danken kurz die Wärme im Herzen. Gefühlte Dankbarkeit wirkt tiefer als gedachte.",affirm:"Dankbarkeit wärmt mein Herz."},
  {t:"Das Selbstverständliche",s:"Atem, Wasser, Licht",txt:"Danke auch für das Alltägliche – deinen Atem, ein Dach, fließendes Wasser. Vieles davon ist alles andere als selbstverständlich.",affirm:"Ich würdige die einfachen Geschenke."},
  {t:"Dankbar für Schweres",s:"die Lektion sehen",txt:"Auch schwere Zeiten haben dich etwas gelehrt. Frag dich sanft, wofür du im Rückblick dankbar sein kannst.",affirm:"Auch das Schwere hat mich wachsen lassen."},
  {t:"Dankbarkeit teilen",s:"es aussprechen",txt:"Sag einem Menschen, wofür du ihm dankbar bist. Geteilte Dankbarkeit verdoppelt sich.",affirm:"Ich spreche meine Dankbarkeit aus."}]},
 vergebung:{name:"Vergebung & Loslassen",img:"bg-vergebung.jpg",he:"Frei werden",sub:"Altes loslassen – für dich, nicht für andere",was:"Vergeben heißt nicht, gutzuheißen, was geschah – sondern den Groll loszulassen, der dich bindet. Du vergibst vor allem für deine eigene Freiheit.",nutzen:"Geh in deinem Tempo. Loslassen ist ein Prozess, kein Knopfdruck. Die Impulse begleiten dich Schritt für Schritt.",items:[
  {t:"Den Schmerz anerkennen",s:"erst fühlen",txt:"Bevor du loslässt, darf der Schmerz da sein. Verdrängtes lässt sich nicht vergeben.",affirm:"Ich erlaube meinem Schmerz, da zu sein."},
  {t:"Vergeben heißt nicht vergessen",s:"Klarheit behalten",txt:"Du darfst vergeben und trotzdem Grenzen setzen. Loslassen heißt nicht, dich erneut verletzen zu lassen.",affirm:"Ich lasse los und schütze mich zugleich."},
  {t:"Der ungesendete Brief",s:"alles aussprechen",txt:"Schreibe alles auf, was du nie gesagt hast – ohne es abzuschicken. Dann zerreiße oder verbrenne den Brief bewusst.",affirm:"Ich lasse meine Worte und den Groll gehen."},
  {t:"Dir selbst vergeben",s:"die schwerste Vergebung",txt:"Sei mild mit dir für das, was nicht gelang. Du hast getan, was du damals konntest.",affirm:"Ich vergebe mir und bin gut zu mir."},
  {t:"Symbolisch loslassen",s:"ein Ritual",txt:"Übergib das Alte einem Bild: ein Blatt im Fluss, ein Stein, den du ablegst, ein Ausatmen. Der Körper versteht Symbole.",affirm:"Ich lege ab, was ich nicht mehr trage."}]},
 selbstliebe:{name:"Selbstliebe",img:"bg-selbstliebe.jpg",he:"Dein eigener Freund",sub:"dich annehmen, wie du bist",was:"Selbstliebe ist keine Selbstverliebtheit, sondern die Entscheidung, freundlich und fürsorglich mit dir umzugehen – besonders dann, wenn es schwer ist.",nutzen:"Behandle dich, wie du einen geliebten Menschen behandeln würdest. Die Impulse zeigen dir konkrete Wege, gut für dich zu sorgen.",items:[
  {t:"Wie zu einem Freund",s:"der Maßstab",txt:"Frag dich in jeder Lage: Was würde ich einem guten Freund jetzt sagen? Und sag es dir selbst.",affirm:"Ich bin mir selbst eine gute Freundin."},
  {t:"Bedürfnisse ernst nehmen",s:"hinhören",txt:"Frag dich mehrmals am Tag: Was brauche ich gerade? Und gib es dir, wo du kannst.",affirm:"Meine Bedürfnisse sind wichtig."},
  {t:"Grenzen als Liebe",s:"Nein sagen dürfen",txt:"Ein liebevolles Nein zu anderen ist oft ein Ja zu dir. Grenzen schützen deine Energie.",affirm:"Ich darf Grenzen setzen."},
  {t:"Den Körper ehren",s:"sanfte Fürsorge",txt:"Berühre dich freundlich, iss nährend, ruh dich aus. Dein Körper trägt dich – behandle ihn dankbar.",affirm:"Ich sorge liebevoll für meinen Körper."},
  {t:"Selbstwert üben",s:"genug sein",txt:"Dein Wert hängt nicht an Leistung. Schon dein Dasein genügt. Erinnere dich täglich daran.",affirm:"Ich bin genug, einfach weil ich bin."}]},
 akasha:{name:"Akasha-Chronik",img:"bg-akasha.jpg",he:"Das Buch der Seele",sub:"das Feld allen Wissens berühren",was:"Die Akasha-Chronik ist die Vorstellung eines feinstofflichen Archivs, in dem die Erfahrungen jeder Seele gespeichert sind. Man nähert sich ihr in tiefer Meditation – als Bild für innere Weisheit jenseits des Verstands.",nutzen:"Nimm diesen Bereich als meditative Reise zu dir selbst. Du musst nichts glauben – nimm, was sich stimmig anfühlt.",items:[
  {t:"Den Raum betreten",s:"in der Stille",txt:"Werde in einer ruhigen Meditation ganz still und stell dir eine große Bibliothek oder einen Lichtraum vor, in den du eintrittst.",affirm:"Ich öffne mich für tiefe Weisheit."},
  {t:"Eine Frage stellen",s:"klar und offen",txt:"Bring eine ehrliche Frage mit – etwa zu einem wiederkehrenden Muster. Lausche dann, ohne zu erzwingen.",affirm:"Ich frage und höre in mich hinein."},
  {t:"Seelenmuster erkennen",s:"rote Fäden",txt:"Manche Themen ziehen sich durch dein Leben. Betrachte sie als alte Lernaufgaben deiner Seele.",affirm:"Ich erkenne die Muster meiner Seele."},
  {t:"Wissen empfangen",s:"in Bildern",txt:"Antworten kommen oft als Bild, Gefühl oder plötzliche Klarheit – nicht als Worte. Vertrau dem, was auftaucht.",affirm:"Ich vertraue dem, was sich mir zeigt."},
  {t:"Mit Dank schließen",s:"zurückkehren",txt:"Bedanke dich innerlich, verlasse den Raum behutsam und schreib auf, was du mitgenommen hast.",affirm:"Ich kehre dankbar und klarer zurück."}]},
 seelenplan:{name:"Seelenplan",img:"bg-seelenplan.jpg",he:"Deine Bestimmung",sub:"deine Lebensaufgabe erkennen",was:"Der Seelenplan ist die Idee, dass deine Seele mit einer Absicht hier ist – etwas, das du lernen, geben oder werden möchtest. Ihn zu erkennen gibt deinem Weg Richtung und Sinn.",nutzen:"Such nicht nach der einen Antwort, sondern nach Hinweisen, die sich stimmig anfühlen. Die Impulse helfen dir, deiner Bestimmung näherzukommen.",items:[
  {t:"Was dich aufleuchten lässt",s:"deine Freude",txt:"Wobei vergisst du die Zeit? Worüber sprichst du mit leuchtenden Augen? Darin liegt eine Spur zu deiner Aufgabe.",affirm:"Meine Freude weist mir den Weg."},
  {t:"Deine Gaben",s:"was dir leichtfällt",txt:"Was andere an dir schätzen und was dir mühelos gelingt, ist oft ein Geschenk, das die Welt von dir braucht.",affirm:"Ich teile meine Gaben mit der Welt."},
  {t:"Schmerz als Lehrer",s:"verwandelte Wunden",txt:"Oft hilfst du anderen am besten dort, wo du selbst gelitten und gewachsen bist. Deine Wunde kann zur Quelle werden.",affirm:"Aus meinem Weg wird Hilfe für andere."},
  {t:"Werte klären",s:"was wirklich zählt",txt:"Frag dich, was dir am Ende deines Lebens wichtig gewesen sein soll. Deine Werte zeigen deine Richtung.",affirm:"Ich lebe nach dem, was mir wirklich wichtig ist."},
  {t:"Der nächste Schritt",s:"klein anfangen",txt:"Du musst nicht den ganzen Plan kennen. Geh den nächsten stimmigen Schritt – der Weg zeigt sich im Gehen.",affirm:"Ich vertraue meinem Weg, Schritt für Schritt."}]}

function erklB(b){return `<div class="card erkl"><div class="block-label">Was ist das?</div><div>${b.was}</div><div class="block-label">So nutzt du diesen Bereich</div><div>${b.nutzen}</div></div>`;}
function viewBereich(id){const b=NEUE_BEREICHE[id];if(!b)return viewHeute();let html=`<div class="view"><div class="hero hero-bereich" style="background-image:url('${b.img}')"><div class="ornament"></div><div class="he">${b.he}</div><h2>${b.name}</h2><p>${b.sub}</p></div>${erklB(b)}`;html+=b.items.map((it,i)=>`<div class="lib-item" tabindex="0" role="button" onclick="openBereich('${id}',${i})"><div class="li-theme">${b.name}</div><h3>${it.t}</h3><div class="li-aff">${it.s}</div></div>`).join('');return html+`</div>`;}
function openBereich(id,i){const b=NEUE_BEREICHE[id];if(!b)return;const it=b.items[i];current='bereichview';document.getElementById('app').innerHTML=`<div class="view"><div style="text-align:center;margin:18px 0"><button class="btn" style="flex:none;display:inline-block" onclick="render('${id}')">← ${b.name}</button></div><div class="hero hero-bereich" style="background-image:url('${b.img}')"><div class="he">${b.name}</div><h2>${it.t}</h2></div><div class="card"><div>${it.txt}</div><div class="affirm" style="text-align:center;margin-top:16px">„${it.affirm}"</div><div class="actions"><button class="btn" onclick="openShareImage('${esc(it.affirm)}','${b.name}')">Als Bild teilen</button></div></div></div>`;animEnter();window.scrollTo({top:0,behavior:'smooth'});}
function bgTileInner(name,img){return `<div class="c3d-card sign" style="background-image:url('${img}')"><span class="c3d-cap"><span class="c3d-name">${name}</span></span></div>`;}
/* ===== 3D-Karussell-Engine ===== */
let _carousels={};
function escAttr(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;');}
function carousel3dHtml(id,variant,items,start){
  let h=`<div class="carousel3d ${variant}" id="${id}" data-start="${start||0}"><div class="c3d-stage">`;
  h+=items.map((it,i)=>`<div class="c3d-item" data-i="${i}" data-act="${escAttr(it.act||'')}">${it.inner}</div>`).join('');
  h+=`</div><button class="c3d-nav prev" data-dir="-1" aria-label="zurück">&#8249;</button><button class="c3d-nav next" data-dir="1" aria-label="weiter">&#8250;</button><div class="c3d-dots"></div></div>`;
  return h;
}
function layoutCarousel(id){const st=_carousels[id];if(!st)return;const n=st.items.length;st.items.forEach((el,i)=>{let off=i-st.index;if(off>n/2)off-=n;if(off<-n/2)off+=n;const a=Math.abs(off);el.style.transform=`translateX(${off*60}%) translateZ(${-a*200}px) rotateY(${off*-42}deg) scale(${Math.max(0,1-a*0.13)})`;el.style.opacity=a>2?0:1-a*0.30;el.style.zIndex=100-a;el.style.pointerEvents=a>2?'none':'auto';el.classList.toggle('center',off===0);});const dots=st.el.querySelector('.c3d-dots');if(dots)dots.querySelectorAll('i').forEach((d,i)=>d.classList.toggle('on',i===st.index));}
function setCarousel(id,idx){const st=_carousels[id];if(!st)return;const n=st.items.length;st.index=((idx%n)+n)%n;layoutCarousel(id);}
function runAct(a){if(!a)return;const m=a.match(/^([\w$]+)\((?:'([^']*)')?\)$/);if(m&&typeof window[m[1]]==='function'){window[m[1]](m[2]);return;}try{(new Function(a))();}catch(e){}}
function initCarousels(scope){(scope||document).querySelectorAll('.carousel3d').forEach(c=>{if(c._inited)return;c._inited=true;const id=c.id;const stage=c.querySelector('.c3d-stage');if(!stage)return;const items=Array.prototype.slice.call(stage.querySelectorAll('.c3d-item'));if(!items.length)return;const st={el:c,stage:stage,items:items,index:0,dragging:false,moved:false,startX:0};_carousels[id]=st;
  const dots=c.querySelector('.c3d-dots');if(dots){dots.innerHTML=items.map((_,i)=>`<i data-i="${i}"></i>`).join('');dots.querySelectorAll('i').forEach(d=>d.addEventListener('click',()=>setCarousel(id,parseInt(d.dataset.i))));}
  c.querySelectorAll('.c3d-nav').forEach(b=>b.addEventListener('click',()=>setCarousel(id,st.index+parseInt(b.dataset.dir))));
  items.forEach((el,i)=>{el.addEventListener('click',function(){if(st.moved){st.moved=false;return;}if(i===st.index)runAct(el.dataset.act);else setCarousel(id,i);});});
  stage.addEventListener('pointerdown',function(e){st.dragging=true;st.moved=false;st.startX=e.clientX;});
  stage.addEventListener('pointermove',function(e){if(!st.dragging)return;if(Math.abs(e.clientX-st.startX)>8)st.moved=true;});
  stage.addEventListener('pointerup',function(e){if(!st.dragging)return;st.dragging=false;const dx=e.clientX-st.startX;if(dx<=-40)setCarousel(id,st.index+1);else if(dx>=40)setCarousel(id,st.index-1);});

const GATE_URL = "https://spring-sound-7125.service-vpstore.workers.dev";
const GATE_DAYS = 1;
function gateState(){const g=store.get("access",null);if(!g||!g.email)return "locked";if(Date.now()-(g.ts||0) > GATE_DAYS*86400000)return "recheck";return "ok";}
function startGate(){ if(!GATE_URL){ onboard(); return; } const st=gateState(); if(st==="ok"){ onboard(); return; } if(st==="recheck"){ const g=store.get("access",null); gateVerify(g.email,true); return; } showGate(); }
function showGate(msg){ if(document.getElementById('gateOv'))return; const ov=document.createElement('div');ov.className='overlay';ov.id='gateOv';
  ov.innerHTML=`<div class="modal"><div class="logo" style="font-size:24px">Seelen<span>raum</span></div><h2>Willkommen zur\u00fcck</h2><p>Gib die E-Mail ein, mit der du dein Abo abgeschlossen hast.</p><input id="gateEmail" type="email" placeholder="deine@email.de" autocomplete="email"><div class="save-hint" id="gateMsg" style="color:var(--gold);min-height:18px">${msg||''}</div><button class="btn gold" onclick="gateSubmit()">Freischalten</button><p style="font-size:12px;color:var(--ink-fade);margin-top:10px">Noch kein Abo? <a href="index.html" style="color:var(--accent)">Hier Mitglied werden</a></p></div>`;
  document.body.appendChild(ov);setTimeout(()=>{const e=document.getElementById('gateEmail');if(e)e.focus();},80);
  const inp=document.getElementById('gateEmail'); if(inp)inp.addEventListener('keydown',function(ev){if(ev.key==='Enter')gateSubmit();}); }
function gateMsg(t){const m=document.getElementById('gateMsg');if(m)m.textContent=t;}
function gateSubmit(){const e=document.getElementById('gateEmail');const email=(e?e.value:'').trim();if(!email||email.indexOf('@')<0){gateMsg("Bitte g\u00fcltige E-Mail eingeben");return;}gateMsg("Pr\u00fcfe \u2026");gateVerify(email,false);}
async function gateVerify(email,silent){
  try{ const r=await fetch(GATE_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:email})}); const d=await r.json();
    if(d&&d.access){ store.set("access",{email:email.toLowerCase(),ts:Date.now()}); const o=document.getElementById('gateOv'); if(o)o.remove(); if(!document.getElementById('app').innerHTML.trim()) onboard(); }
    else { if(silent){ store.set("access",null); showGate("Dein Abo ist nicht mehr aktiv. Bitte erneut anmelden."); } else gateMsg("Kein aktives Abo zu dieser E-Mail gefunden."); }
  }catch(err){ if(silent){ onboard(); } else gateMsg("Verbindungsfehler \u2013 bitte nochmal versuchen."); } }

function curCompanion(){const id=store.get("companion",null);return id?COMPANIONS.find(c=>c.id===id)||null:null;}
function compInner(c,size){const s=size||64;return `<span class="comp-art" style="width:${s}px;height:${s}px"><span class="comp-disc" style="background:radial-gradient(circle at 50% 42%, ${c.tint}, ${c.tint}99 52%, ${c.tint}00 72%)"></span><img class="comp-img" src="${c.img}" alt="${c.name}" onerror="this.style.display='none';var p=this.parentNode.querySelector('.comp-ph');if(p)p.style.display='flex'"><span class="comp-ph" style="background:radial-gradient(circle at 34% 28%, #ffffffcc, ${c.tint});font-size:${Math.round(s*0.4)}px">${c.name[0]}</span></span>`;}
function updateCompanion(){const host=document.getElementById('companionHost');if(!host)return;const c=curCompanion();if(!c){host.innerHTML='';return;}
  host.innerHTML=`<div class="companion" id="companion" onclick="companionTap()" title="${c.name}">${compInner(c,64)}</div>`;}
let _lastSay=0,_greeted=false,_pickerShown=false;
function companionBubble(text){const old=document.getElementById('compBubble');if(old)old.remove();const b=document.createElement('div');b.id='compBubble';b.className='comp-bubble';b.textContent=text;document.body.appendChild(b);requestAnimationFrame(()=>b.classList.add('show'));setTimeout(()=>{if(b){b.classList.remove('show');setTimeout(()=>b.remove(),300);}},6500);}
let _lastSpruch="";
function spruch(c){if(!c.sprueche||!c.sprueche.length)return c.tipp;let s;let n=0;do{s=c.sprueche[Math.floor(Math.random()*c.sprueche.length)];n++;}while(s===_lastSpruch&&c.sprueche.length>1&&n<8);_lastSpruch=s;return s;}
function companionSay(context,force){const c=curCompanion();if(!c)return;const now=Date.now();if(!force&&now-_lastSay<18000)return;_lastSay=now;const text=c[context]||spruch(c);companionBubble(text);}
function companionTap(){const c=curCompanion();if(!c)return;_lastSay=Date.now();companionBubble(spruch(c));}
function companionOnRender(view){updateCompanion();
  if(view==='heute'&&!curCompanion()){if(!_pickerShown){_pickerShown=true;setTimeout(showCompanionPicker,600);}return;}
  const c=curCompanion();if(!c)return;
  if(view==='heute'&&!_greeted){_greeted=true;const mi=moonInfo(heute);setTimeout(()=>companionSay(mi.idx===4?'vollmond':'morgen',true),700);}
  else if(view==='kosmos'){setTimeout(()=>companionSay('kosmos'),400);}}
function showCompanionPicker(){if(document.getElementById('compPickOv'))return;const cur=store.get("companion",null);
  const ov=document.createElement('div');ov.className='overlay';ov.id='compPickOv';
  const startIdx=Math.max(0,COMPANIONS.findIndex(c=>c.id===cur));
  const items=COMPANIONS.map(c=>({act:`chooseCompanion('${c.id}')`,inner:`<div class="c3d-card comp"><span class="comp-pick-img" style="width:92px;height:92px">${compInner(c,92)}</span><div class="c3d-name" style="margin-top:8px">${c.name}</div><div class="c3d-keys">${c.thema}</div></div>`}));
  ov.innerHTML=`<div class="modal" style="max-width:430px"><div class="logo" style="font-size:22px">Seelen<span>raum</span></div><h2 style="font-size:22px">Wähle deinen Begleiter</h2><p>Ein Tier, das dich von nun an durch deine Praxis begleitet. Swipe und tippe zum Wählen.</p>${carousel3dHtml('compCar','companions',items,startIdx)}<button class="skip" onclick="closeOverlay(this)">${cur?'schließen':'später wählen'}</button></div>`;
  document.body.appendChild(ov);ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});initCarousels(ov);}
function chooseCompanion(id){store.set("companion",id);const o=document.getElementById('compPickOv');if(o)o.remove();updateCompanion();const c=curCompanion();_lastSay=0;setTimeout(()=>companionBubble("Schön, dass du mich gewählt hast. Von nun an bin ich bei dir. ✦"),300);}

let current='heute';let _hist=[],_goingBack=false;function goBack(){if(_hist.length){_goingBack=true;render(_hist.pop());}}
function tabFor(v){if(['meditationen','atem','rituale','klang','reisen','praxis','medplay','ritualview','reise'].includes(v))return 'praxis';if(['impulse','neu','detail'].includes(v))return 'impulse';if(['kosmos','mond','astro','num','mani','chakra','kristalle','engel','tier','wissen','china','orakel','signview','methodview','chakraview','mondphase','kristallview','engelview','tierview','wissenview','chinaview','traumdeutung','schattenarbeit','inneres-kind','tarot','affirmationen','reinigung','intuition','dankbarkeit','vergebung','selbstliebe','akasha','seelenplan','bereichview'].includes(v))return 'kosmos';if(v==='tagebuch')return 'tagebuch';if(v==='weg')return 'weg';if(v==='heute')return 'heute';return '';}
function render(view){
  const prevView=current;const prevScroll=window.scrollY;
  if(view!==prevView){if(_goingBack)_goingBack=false;else{_hist.push(prevView);if(_hist.length>60)_hist.shift();}}
  if(view!=='atem'){stopBreathe();if(breathSound){breathSound.stop();breathSound=null;}atemSel=null;}
  if(view!=='medplay')medStop();
  /* Klang darf bereichsübergreifend weiterspielen */
  current=view;const tb=tabFor(view);
  document.querySelectorAll('.nav-top button,.tabbar button').forEach(b=>b.classList.toggle('active',b.dataset.view===tb));
  const v={heute:viewHeute,neu:viewNeu,impulse:viewImpulse,praxis:viewPraxis,meditationen:viewMeditationen,atem:viewAtem,rituale:viewRituale,klang:viewKlang,mond:viewMond,reisen:viewReisen,tagebuch:viewTagebuch,weg:viewWeg,favoriten:viewFavoriten,kosmos:viewKosmos,astro:viewAstro,num:viewNum,mani:viewMani,chakra:viewChakra,kristalle:viewKristalle,engel:viewEngel,tier:viewTier,wissen:viewWissen,china:viewChina,orakel:viewOrakel}[view];
  document.getElementById('app').innerHTML=v?v():(NEUE_BEREICHE[view]?viewBereich(view):viewHeute());companionOnRender(view);
  initCarousels(document.getElementById('app'));
  var _bb=document.getElementById('backBtn');if(_bb)_bb.style.display=_hist.length?'inline-flex':'none';
  if(view!==prevView){animEnter();applyReveal(document.getElementById('app'));}
  /* Bei erneutem Rendern derselben Ansicht (z.B. nach einem Klick) Scroll-Position halten – kein Sprung nach oben.
     Nur bei echtem Ansichtswechsel sanft nach oben scrollen. */
  if(view===prevView){window.scrollTo({top:prevScroll});}
  else if(!['impulse','favoriten','tagebuch','meditationen','rituale'].includes(view))window.scrollTo({top:0,behavior:'smooth'});
}
document.querySelectorAll('.nav-top button,.tabbar button').forEach(b=>b.addEventListener('click',()=>render(b.dataset.view)));
document.addEventListener('keydown',function(e){if(e.key==='Enter'){const a=document.activeElement;if(a&&a.classList&&(a.classList.contains('lib-item')||a.classList.contains('sound')||a.classList.contains('mood')||a.classList.contains('draw-back')||a.classList.contains('rstep')||a.classList.contains('zsign'))){e.preventDefault();a.click();}}});
(function(){const f=document.getElementById('favBtn');if(f)f.addEventListener('click',()=>render('favoriten'));})();
/* ===== Theme / Install / Onboarding ===== */
function applyTheme(t){document.documentElement.setAttribute("data-theme",t);const b=document.getElementById("themeToggle");if(b)b.innerHTML=t==="dark"?icon('sun'):icon('moon');}
(function initTheme(){let t=store.get("theme",null);if(!t)t=(window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light";applyTheme(t);const btn=document.getElementById("themeToggle");if(btn)btn.addEventListener("click",()=>{const cur=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark";store.set("theme",cur);applyTheme(cur);});})();
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;const b=document.getElementById('installBanner');if(b)b.style.display='flex';});
(function(){const btn=document.getElementById('installBtn');if(btn)btn.addEventListener('click',async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();try{await deferredPrompt.userChoice;}catch(e){}deferredPrompt=null;const b=document.getElementById('installBanner');if(b)b.style.display='none';});})();
if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("sw.js").catch(()=>{});});}
function onboard(){if(store.get("onboarded",false)){updateHeader();render('heute');return;}
  const ov=document.createElement('div');ov.className="overlay";
  ov.innerHTML=`<div class="modal"><div class="logo" style="font-size:24px">Seelen<span>raum</span></div><h2>Willkommen.</h2><p>Dein ruhiger Ort für jeden Tag. Erzähl mir kurz von dir.</p><input id="nameIn" placeholder="Dein Vorname (optional)" maxlength="24"><input id="bdIn2" type="date" style="color:var(--ink-soft)"><input id="intIn" placeholder="Absicht für die Woche (optional)" maxlength="60"><button class="btn gold" onclick="finishOnboard()">Eintreten</button><button class="skip" onclick="finishOnboard()">überspringen</button></div>`;
  document.body.appendChild(ov);window._ov=ov;setTimeout(()=>{const el=document.getElementById('nameIn');if(el)el.focus();},100);}
function finishOnboard(){const el=document.getElementById('nameIn');if(el&&el.value.trim()){state.name=el.value.trim();store.set("name",state.name);}const bd=document.getElementById('bdIn2');if(bd&&bd.value)store.set("birthdate",bd.value);const it=document.getElementById('intIn');if(it&&it.value.trim()){state.intention={text:it.value.trim(),week:weekKey};store.set("intention",state.intention);}store.set("onboarded",true);if(window._ov)window._ov.remove();updateHeader();render('heute');}
function resetAll(){if(confirm("Alle deine Daten (Name, Tagebuch, Stimmung, Streak, Favoriten, Reisen) zurücksetzen?")){["name","favs","streak","lastDone","journey","journal","moods","days","intention","birthdate","birthYear","freejournal","access","companion","onboarded","theme"].forEach(k=>localStorage.removeItem("sr_"+k));location.reload();}}
fillIcons();initCosmosBg();initParallax();startGate();
</script>
</body>
</html>
