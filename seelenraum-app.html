<!--
  ============================================================
  SEELENRAUM  —  Membership-App  (Welt-Version)
  Bereiche: Heute · Impulse · Praxis (Meditationen, Atem,
  Rituale, Klangraum, Reisen) · Mond · Tagebuch · Mein Weg
  Inhalte unten in den const-Arrays pflegbar.
  ============================================================
-->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Seelenraum — deine tägliche Praxis</title>
<meta name="description" content="Seelenraum: dein ruhiger Ort für jeden Tag. Impulse, Meditationen, Rituale, Atem, Klangraum, Mondkalender, Tagebuch.">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#f4ede7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1b1722" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Seelenraum">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3CradialGradient id='g' cx='35%25' cy='30%25'%3E%3Cstop offset='0' stop-color='%23cdb4e6'/%3E%3Cstop offset='1' stop-color='%238a76a8'/%3E%3C/radialGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='46' fill='url(%23g)'/%3E%3Ccircle cx='50' cy='50' r='26' fill='none' stroke='%23fff' stroke-opacity='.85' stroke-width='2'/%3E%3C/svg%3E">
<style>
  :root{
    --ink:#3b333f;--ink-soft:#6f6678;--ink-fade:#9a90a2;
    --gold:#b08d57;--accent:#8a76a8;--accent-deep:#6f5d8e;
    --card:#fffdfb;--line:#ece2d9;--good:#7fa98c;--field:#faf6f1;
    --shadow:0 12px 34px rgba(80,60,90,.10);--shadow-sm:0 4px 14px rgba(80,60,90,.07);
  }
  html[data-theme="dark"]{
    --ink:#ece6f0;--ink-soft:#b3a9bd;--ink-fade:#8a8094;
    --gold:#d8b87e;--accent:#bda7dd;--accent-deep:#d3c2ea;
    --card:#272231;--line:#3b3548;--good:#8fc1a0;--field:#221d2c;
    --shadow:0 12px 34px rgba(0,0,0,.38);--shadow-sm:0 4px 14px rgba(0,0,0,.28);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Georgia','Times New Roman',serif;color:var(--ink);
    background:
      radial-gradient(900px 500px at 12% -8%, #efe3f3 0%, transparent 60%),
      radial-gradient(800px 480px at 100% 8%, #dcebe6 0%, transparent 55%),
      radial-gradient(700px 600px at 50% 120%, #f3e7dc 0%, transparent 60%),
      linear-gradient(160deg,#f7f1ec,#efe7f1 60%,#e6efec);
    background-attachment:fixed;background-color:#f4ede7;
    min-height:100vh;line-height:1.65;-webkit-font-smoothing:antialiased;padding-bottom:96px}
  html[data-theme="dark"] body{background:
      radial-gradient(900px 500px at 12% -8%, #2a2440 0%, transparent 60%),
      radial-gradient(800px 480px at 100% 8%, #1f2b34 0%, transparent 55%),
      radial-gradient(700px 600px at 50% 120%, #2c2533 0%, transparent 60%),
      linear-gradient(160deg,#1c1822,#231d2e 60%,#1a2220);background-color:#1b1722}
  .wrap{max-width:680px;margin:0 auto;padding:0 18px}
  header{text-align:center;padding:30px 0 4px}
  .logo{font-size:28px;letter-spacing:7px;text-transform:uppercase;font-weight:normal}
  .logo span{color:var(--gold)}
  .tag{font-style:italic;color:var(--ink-soft);font-size:14px;margin-top:6px}
  .greet{font-size:13px;letter-spacing:1px;color:var(--ink-soft);margin-top:14px}
  .streak{display:inline-flex;align-items:center;gap:8px;margin-top:10px;background:var(--card);border:1px solid var(--line);border-radius:30px;padding:7px 16px;box-shadow:var(--shadow-sm);font-family:Arial,sans-serif;font-size:12px;letter-spacing:1px;color:var(--ink-soft)}
  .streak b{color:var(--gold);font-size:14px}
  .corner{position:fixed;top:14px;z-index:30;background:var(--card);border:1px solid var(--line);border-radius:50%;width:42px;height:42px;cursor:pointer;font-size:17px;line-height:1;color:var(--ink-soft);box-shadow:var(--shadow-sm);transition:.2s;display:flex;align-items:center;justify-content:center}
  .corner:hover{color:var(--accent);transform:scale(1.06)}
  .corner.left{left:14px}.corner.right{right:14px}
  /* Sektions-Farbwelten */
  .view.sec-med{--accent:#5d6cc0;--accent-deep:#454f96}
  .view.sec-ritual{--accent:#c2895a;--accent-deep:#9a6336}
  .view.sec-mond{--accent:#7787bd;--accent-deep:#56638f}
  .view.sec-atem{--accent:#56a59c;--accent-deep:#3c7a72}
  .view.sec-klang{--accent:#c0789a;--accent-deep:#9a5475}
  .view.sec-praxis{--accent:#8a76a8;--accent-deep:#6f5d8e}
  .view{animation:fade .5s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  /* Hero-Köpfe je Bereich */
  .hero{border-radius:24px;padding:34px 26px;text-align:center;color:#fff;margin:16px 0;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .hero .he{font-family:Arial,sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;opacity:.85}
  .hero h2{color:#fff;font-size:30px;font-weight:normal;margin:6px 0 4px}
  .hero p{color:rgba(255,255,255,.88);font-size:15px;font-style:italic;max-width:30ch;margin:0 auto}
  .hero .ornament{position:absolute;width:160px;height:160px;border-radius:50%;border:2px solid rgba(255,255,255,.25);top:-60px;right:-40px}
  .hero-impulse{background:linear-gradient(135deg,#a48bc4,#6f5d8e)}
  .hero-med{background:linear-gradient(135deg,#6273c4,#363c66)}
  .hero-ritual{background:linear-gradient(135deg,#cf9c66,#9a6336)}
  .hero-mond{background:linear-gradient(135deg,#8a98c8,#444c73)}
  .hero-atem{background:linear-gradient(135deg,#5fb1a7,#3c7a72)}
  .hero-klang{background:linear-gradient(135deg,#cf85a6,#8f4d6b)}
  .hero-reisen{background:linear-gradient(135deg,#c2a36a,#7a6a44)}
  .hero-weg{background:linear-gradient(135deg,#9a86bc,#5f5384)}
  .hero-tagebuch{background:linear-gradient(135deg,#b59ac0,#6d5a7e)}
  /* Discover-Tiles */
  .tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:14px 0}
  .tile{border-radius:18px;padding:18px 16px;color:#fff;cursor:pointer;min-height:104px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--shadow-sm);transition:.2s;border:none;text-align:left;font-family:inherit}
  .tile:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
  .tile .ti{font-size:22px;line-height:1}
  .tile .tt{font-size:18px;margin-top:auto}
  .tile .ts{font-family:Arial,sans-serif;font-size:11px;opacity:.88;letter-spacing:.4px;margin-top:2px}
  .nav-top{display:flex;justify-content:center;gap:3px;margin:18px 0 6px;flex-wrap:wrap}
  .nav-top button{font-family:Arial,sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase;background:transparent;border:1px solid transparent;border-radius:30px;padding:8px 13px;color:var(--ink-soft);cursor:pointer;transition:.2s}
  .nav-top button:hover{color:var(--ink)}.nav-top button.active{background:var(--card);color:var(--accent-deep);box-shadow:var(--shadow-sm);border-color:var(--line)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:32px 28px;margin:16px 0}
  .theme-pill{display:inline-block;font-family:Arial,sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);border:1px solid var(--accent);border-radius:20px;padding:4px 12px;opacity:.9}
  .badge-new{display:inline-block;background:var(--gold);color:#fff;font-family:Arial,sans-serif;font-size:9px;letter-spacing:1px;padding:3px 9px;border-radius:10px;margin-left:8px;vertical-align:middle}
  h2{font-size:25px;font-weight:normal;margin:14px 0 6px;line-height:1.28}
  .affirm{font-size:21px;font-style:italic;color:var(--accent-deep);margin:18px 0;line-height:1.55}
  .block-label{font-family:Arial,sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin:22px 0 6px}
  .section-title{text-align:center;font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--ink-soft);margin:26px 0 2px}
  .section-sub{text-align:center;font-style:italic;color:var(--ink-soft);font-size:14px;margin-bottom:6px}
  .actions{display:flex;gap:10px;margin-top:22px;flex-wrap:wrap}
  .btn{flex:1;min-width:120px;font-family:Arial,sans-serif;font-size:12px;letter-spacing:1px;border:1px solid var(--line);background:transparent;border-radius:30px;padding:12px;color:var(--ink-soft);cursor:pointer;transition:.2s}
  .btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.gold:hover{background:var(--gold);border-color:var(--gold)}
  .btn.done{background:var(--good);color:#fff;border-color:var(--good)}
  .btn.fav-on{background:var(--gold);color:#fff;border-color:var(--gold)}
  .btn.solid{background:var(--accent);color:#fff;border-color:var(--accent)}
  .banner{background:linear-gradient(135deg,#efe6f4,#e7f0ec);border:1px solid var(--line);border-radius:18px;padding:14px 18px;margin:14px 0;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:var(--shadow-sm)}
  html[data-theme="dark"] .banner{background:linear-gradient(135deg,#322a42,#26303a)}
  .banner .b-txt{font-size:14px}.banner .b-txt b{color:var(--accent-deep)}
  .banner button{font-family:Arial,sans-serif;font-size:11px;letter-spacing:1px;background:var(--accent);color:#fff;border:none;border-radius:20px;padding:8px 14px;cursor:pointer;white-space:nowrap}
  .mood-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:10px 0 4px}
  .mood{cursor:pointer;border:1px solid var(--line);background:var(--field);border-radius:16px;padding:10px 12px;text-align:center;font-family:Arial,sans-serif;font-size:11px;letter-spacing:.5px;color:var(--ink-soft);transition:.2s;min-width:60px}
  .mood:hover{border-color:var(--accent)}.mood .dot{display:block;width:14px;height:14px;border-radius:50%;margin:0 auto 6px}
  .mood.sel{background:var(--accent);color:#fff;border-color:var(--accent)}
  textarea.journal{width:100%;min-height:88px;font-family:inherit;font-size:16px;color:var(--ink);background:var(--field);border:1px solid var(--line);border-radius:14px;padding:14px 16px;resize:vertical;line-height:1.5}
  textarea.journal:focus{outline:none;border-color:var(--accent)}
  .save-hint{font-family:Arial,sans-serif;font-size:11px;letter-spacing:1px;color:var(--good);height:16px;margin-top:6px}
  .jentry{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin:12px 0;box-shadow:var(--shadow-sm)}
  .jentry .je-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .jentry .je-theme{font-family:Arial,sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--accent)}
  .jentry .je-date{font-family:Arial,sans-serif;font-size:10px;color:var(--ink-fade);letter-spacing:1px}
  .jentry h3{font-size:18px;font-weight:normal;margin:3px 0 8px}
  .jentry .je-text{color:var(--ink);white-space:pre-wrap;font-size:15px}
  .jentry .je-del{font-family:Arial,sans-serif;font-size:11px;color:var(--ink-fade);background:none;border:none;cursor:pointer;margin-top:10px;text-decoration:underline}
  .search{width:100%;font-family:inherit;font-size:15px;color:var(--ink);background:var(--field);border:1px solid var(--line);border-radius:30px;padding:11px 18px;margin:6px 0 4px}
  .search:focus{outline:none;border-color:var(--accent)}
  .filters{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:12px 0}
  .filters button{font-family:Arial,sans-serif;font-size:11px;letter-spacing:1px;background:transparent;border:1px solid var(--line);border-radius:20px;padding:6px 13px;color:var(--ink-soft);cursor:pointer;transition:.2s}
  .filters button.active,.filters button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
  .lib-item{position:relative;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin:12px 0;box-shadow:var(--shadow-sm);cursor:pointer;transition:.2s}
  .lib-item:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
  .lib-item .li-theme{font-family:Arial,sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--accent)}
  .lib-item h3{font-size:19px;font-weight:normal;margin:4px 0}
  .lib-item .li-aff{font-style:italic;color:var(--ink-soft);font-size:15px}
  .li-date{font-family:Arial,sans-serif;font-size:10px;color:var(--ink-fade);letter-spacing:1px;position:absolute;top:18px;right:20px}
  .li-meta{font-family:Arial,sans-serif;font-size:10px;color:var(--ink-fade);letter-spacing:1px;position:absolute;top:18px;right:20px}
  .li-fav{position:absolute;bottom:16px;right:18px;font-size:15px;color:var(--gold)}
  .li-note{position:absolute;bottom:16px;right:42px;font-size:13px;color:var(--accent)}
  .empty{text-align:center;color:var(--ink-soft);font-style:italic;padding:34px}
  .journey{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:24px;margin:16px 0;box-shadow:var(--shadow-sm)}
  .journey h3{font-size:22px;font-weight:normal;margin-bottom:4px}.journey p{color:var(--ink-soft);font-size:15px;margin-bottom:14px}
  .progress{height:7px;background:var(--line);border-radius:10px;overflow:hidden;margin:12px 0}
  .progress i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:10px;transition:width .4s}
  .j-meta{font-family:Arial,sans-serif;font-size:11px;letter-spacing:1px;color:var(--ink-fade);display:flex;justify-content:space-between;margin-top:6px}
  .step-list{counter-reset:rs;margin:6px 0}
  .step-list .rstep{position:relative;padding:12px 0 12px 46px;border-bottom:1px solid var(--line)}
  .step-list .rstep:last-child{border-bottom:none}
  .step-list .rstep::before{counter-increment:rs;content:counter(rs);position:absolute;left:0;top:10px;width:30px;height:30px;border-radius:50%;background:var(--accent);color:#fff;font-family:Arial,sans-serif;font-size:13px;display:flex;align-items:center;justify-content:center}
  .need{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
  .need span{font-family:Arial,sans-serif;font-size:12px;background:var(--field);border:1px solid var(--line);border-radius:16px;padding:6px 12px;color:var(--ink-soft)}
  /* Player (Meditation/Atem) */
  .player{text-align:center;padding:24px 0 8px}
  .orb{width:170px;height:170px;border-radius:50%;margin:22px auto;background:radial-gradient(circle at 35% 30%,#cdb4e6,#8a76a8);box-shadow:0 0 50px rgba(138,118,168,.45);transition:transform 4s ease-in-out,box-shadow 4s ease-in-out}
  .orb.expand{transform:scale(1.42);box-shadow:0 0 80px rgba(138,118,168,.6)}
  .view.sec-atem .orb{background:radial-gradient(circle at 35% 30%,#a8e0d8,#56a59c)}
  .view.sec-med .orb{background:radial-gradient(circle at 35% 30%,#b6c0ee,#5d6cc0)}
  .player .pword{font-size:22px;font-style:italic;color:var(--accent-deep);min-height:32px;margin-top:4px}
  .player .pstep{font-size:18px;color:var(--ink);max-width:30ch;margin:6px auto 0;line-height:1.5;min-height:54px}
  .player .pcount{font-family:Arial,sans-serif;font-size:13px;letter-spacing:2px;color:var(--ink-soft)}
  .pbar{height:6px;background:var(--line);border-radius:10px;overflow:hidden;margin:16px auto;max-width:320px}
  .pbar i{display:block;height:100%;background:var(--accent);width:0;transition:width .3s}
  /* Klang-Tiles */
  .sound-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:10px}
  .sound{border:1px solid var(--line);background:var(--card);border-radius:18px;padding:20px 16px;cursor:pointer;text-align:center;transition:.2s;box-shadow:var(--shadow-sm)}
  .sound:hover{transform:translateY(-2px)}
  .sound.playing{background:var(--accent);color:#fff;border-color:var(--accent)}
  .sound .si{font-size:26px}.sound .sn{font-size:17px;margin-top:6px}.sound .sd{font-family:Arial,sans-serif;font-size:11px;color:var(--ink-fade);letter-spacing:.5px;margin-top:2px}
  .sound.playing .sd{color:rgba(255,255,255,.85)}
  /* Mond */
  .moon-vis{width:150px;height:150px;border-radius:50%;margin:8px auto 14px;background:#dfd7ea;box-shadow:inset 0 0 0 1px var(--line),0 8px 30px rgba(80,60,90,.18);position:relative;overflow:hidden}
  .moon-vis .shadow{position:absolute;top:0;height:100%;background:#2a2540;opacity:.92}
  /* Stats */
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:8px 0}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 10px;text-align:center;box-shadow:var(--shadow-sm)}
  .stat .num{font-size:30px;color:var(--accent-deep)}.stat .lbl{font-family:Arial,sans-serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-fade);margin-top:4px}
  .heat{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:10px 0}
  .heat .cell{aspect-ratio:1;border-radius:6px;background:var(--field);border:1px solid var(--line)}
  .heat .cell.on{background:var(--accent);border-color:var(--accent)}.heat .cell.today{box-shadow:0 0 0 2px var(--gold)}
  .heat-legend{font-family:Arial,sans-serif;font-size:11px;color:var(--ink-fade);text-align:center;letter-spacing:1px}
  .moodtrend{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin:8px 0}.moodtrend .md{width:13px;height:13px;border-radius:50%;border:1px solid var(--line)}
  .badges{display:grid;grid-template-columns:repeat(auto-fit,minmax(92px,1fr));gap:10px;margin-top:10px}
  .badge{background:var(--field);border:1px solid var(--line);border-radius:14px;padding:14px 8px;text-align:center;opacity:.4;transition:.2s}
  .badge.on{opacity:1;background:var(--card);box-shadow:var(--shadow-sm)}.badge .bi{font-size:22px;color:var(--gold)}.badge .bn{font-family:Arial,sans-serif;font-size:10px;letter-spacing:.3px;color:var(--ink-soft);margin-top:5px;line-height:1.3}
  .intention{background:linear-gradient(135deg,#f3ecf6,#e9f1ed);border:1px solid var(--line);border-radius:18px;padding:16px 18px;margin:14px 0;box-shadow:var(--shadow-sm)}
  html[data-theme="dark"] .intention{background:linear-gradient(135deg,#2c2640,#243029)}
  .intention .il{font-family:Arial,sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold)}
  .intention .it{font-size:18px;font-style:italic;color:var(--accent-deep);margin-top:4px}
  .intention .ie{font-family:Arial,sans-serif;font-size:11px;color:var(--ink-fade);background:none;border:none;cursor:pointer;text-decoration:underline;margin-top:6px;padding:0}
  .intention input{width:100%;font-family:inherit;font-size:16px;color:var(--ink);background:var(--field);border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin:8px 0}
  .draw-card{width:230px;height:320px;margin:14px auto 4px;border-radius:20px;cursor:pointer;box-shadow:var(--shadow);overflow:hidden}
  .draw-back{background:radial-gradient(circle at 35% 30%,#cdb4e6,#8a76a8);display:flex;align-items:center;justify-content:center}
  .draw-back::after{content:"";width:116px;height:116px;border-radius:50%;border:2px solid rgba(255,255,255,.85)}
  .draw-face{background:var(--card);border:1px solid var(--line);padding:26px 22px;display:flex;flex-direction:column;justify-content:center;text-align:center;animation:fade .55s ease}
  .draw-face .dp{font-family:Arial,sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
  .draw-face .dh{font-size:21px;margin-bottom:12px}.draw-face .da{font-size:18px;font-style:italic;color:var(--accent-deep)}
  .style-chips{display:flex;gap:8px;justify-content:center;margin-bottom:12px}
  .style-chips button{font-family:Arial,sans-serif;font-size:11px;letter-spacing:1px;border:1px solid var(--line);background:transparent;border-radius:20px;padding:6px 14px;color:var(--ink-soft);cursor:pointer}
  .style-chips button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .overlay{position:fixed;inset:0;background:rgba(58,51,64,.6);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50;animation:fade .3s ease}
  .modal{background:var(--card);border-radius:24px;max-width:440px;width:100%;padding:30px 26px;text-align:center;box-shadow:var(--shadow);max-height:90vh;overflow:auto}

/* Mondphase */
function moonInfo(d){
  const lp=2551443, now=d.getTime()/1000, newMoon=947182440; // bekannter Neumond
  let phase=((now-newMoon)%lp)/lp; if(phase<0)phase+=1;
  const idx=Math.floor(phase*8+0.5)%8;
  const illum=Math.round((1-Math.cos(phase*2*Math.PI))/2*100);
  return {idx, illum, frac:phase};
}
function updateHeader(){
  const h=heute.getHours(); const teil=h<11?"Guten Morgen":h<17?"Schön, dass du da bist":"Guten Abend";

function markDone(msg){
  if(state.lastDone===todayKey){ if(!state.days.includes(todayKey)){state.days.push(todayKey);store.set("days",state.days);} if(msg)toast(msg); return; }
  state.streak=(state.lastDone===yesterdayKey())?state.streak+1:1; state.lastDone=todayKey;
  if(!state.days.includes(todayKey))state.days.push(todayKey);
  store.set("streak",state.streak);store.set("lastDone",state.lastDone);store.set("days",state.days);
  updateHeader();toast(msg||"Schön, dass du heute da warst ✦");companionSay('streak');
}

  let canFileShare=false;try{canFileShare=!!(navigator.canShare&&navigator.canShare({files:[new File([new Blob([""],{type:"image/png"})],"a.png",{type:"image/png"})]}));}catch(e){canFileShare=false;}
  const ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML=`<div class="modal"><h2 style="font-size:22px">Dein Affirmations-Bild</h2><p>Perfekt für deine Instagram-Story. Wähle einen Stil, speichere oder teile.</p>
    <div class="style-chips"><button class="active" onclick="setShareStyle('hell',this)">Hell</button><button onclick="setShareStyle('dunkel',this)">Dunkel</button><button onclick="setShareStyle('gold',this)">Gold</button></div>
    <img class="preview" id="sharePrev" src="${shareURL}" alt="Affirmation">
    ${canFileShare?'<button class="btn gold" onclick="shareImageFile()">Direkt teilen</button>':''}
    <button class="btn" onclick="downloadShare()">Bild speichern</button><button class="skip" onclick="closeOverlay(this)">schließen</button></div>`;
  document.body.appendChild(ov);ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});}
function setShareStyle(st,btn){shareStyle=st;shareURL=drawShareCard(shareAff,shareThema,st);const img=document.getElementById('sharePrev');if(img)img.src=shareURL;document.querySelectorAll('.style-chips button').forEach(b=>b.classList.toggle('active',b===btn));}
function closeOverlay(el){const o=el.closest('.overlay');if(o)o.remove();}
function downloadShare(){const a=document.createElement('a');a.href=shareURL;a.download="seelenraum-affirmation.png";document.body.appendChild(a);a.click();a.remove();toast("Bild gespeichert ✦");}
function dataURLtoBlob(u){const a=u.split(',');const m=a[0].match(/:(.*?);/)[1];const b=atob(a[1]);let n=b.length;const arr=new Uint8Array(n);while(n--)arr[n]=b.charCodeAt(n);return new Blob([arr],{type:m});}
async function shareImageFile(){try{const f=new File([dataURLtoBlob(shareURL)],"seelenraum.png",{type:"image/png"});await navigator.share({files:[f],text:"— Seelenraum"});}catch(e){}}

const STERNZEICHEN=[
  {id:"wid",name:"Widder",sym:"&#9800;",von:[3,21],bis:[4,19],element:"Feuer",planet:"Mars",keys:"Mut · Tatkraft · Neuanfang",staerke:"Du gehst voran, wo andere zögern. Deine Energie entzündet Bewegung.",wachstum:"Lerne, auch mal innezuhalten – nicht jeder Funke muss sofort lodern.",affirm:"Ich vertraue meinem Mut und gehe meinen Weg.",essenz:"Widder ist das erste Zeichen des Tierkreises – der Frühlingsanfang, der erste Impuls, die rohe Lebenskraft. Als Widder trägst du den Mut des Anfangs in dir: Du wagst, wo andere zaudern, und setzt Energie frei, die Bewegung entzündet.",staerken:"Du bist mutig, direkt, begeisterungsfähig und voller Tatendrang. Du übernimmst Führung wie selbstverständlich und kämpfst für das, woran du glaubst. Deine Spontaneität und Ehrlichkeit wirken ansteckend.",schatten:"Dein Feuer kann zu Ungeduld, Jähzorn oder Rücksichtslosigkeit werden. Du beginnst oft mit Schwung und verlierst das Interesse, bevor es vollendet ist. Lerne, deine Kraft zu kanalisieren statt sie zu verpuffen.",liebe:"In der Liebe bist du leidenschaftlich, direkt und eroberungsfreudig. Du brauchst einen Partner, der dein Tempo mithält und dir Eigenständigkeit lässt – Langeweile ist dein größter Feind.",beruf:"Du blühst dort auf, wo du vorangehen, gründen oder Wettbewerb spüren kannst – Unternehmertum, Sport, Pionierprojekte, Krisenmanagement.",wachstumText:"Dein Wachstum liegt in Geduld und Beständigkeit: nicht jeder Funke muss sofort lodern. Lerne innezuhalten, andere einzubeziehen und Begonnenes zu vollenden.",elementText:"Als Feuerzeichen lebst du von Begeisterung, Tatkraft und Spontaneität – du musst brennen, um dich lebendig zu fühlen.",planetText:"Dein Herrscher Mars schenkt dir Antrieb, Mut und Durchsetzungskraft – die Energie, die Dinge in Bewegung bringt.",tipp:"Bevor du losstürmst, atme dreimal. Ein Moment Innehalten macht deinen Mut weise."},
  {id:"sti",name:"Stier",sym:"&#9801;",von:[4,20],bis:[5,20],element:"Erde",planet:"Venus",keys:"Beständigkeit · Genuss · Sicherheit",staerke:"Du schaffst Halt und Schönheit. Auf dich ist Verlass.",wachstum:"Erlaube dir Veränderung – nicht alles Sichere ist auch lebendig.",affirm:"Ich ruhe in mir und darf trotzdem wachsen.",essenz:"Stier ist das Zeichen der Erde, des Genusses und der Beständigkeit. Du bist hier, um zu verkörpern, zu genießen und Sicherheit zu schaffen – mit allen Sinnen im Leben verwurzelt.",staerken:"Du bist verlässlich, geduldig, bodenständig und ausdauernd. Du schaffst Schönheit, Halt und Sicherheit. Auf dein Wort und deine Treue kann man bauen.",schatten:"Deine Beständigkeit kann zu Sturheit, Besitzdenken oder Trägheit werden. Du hältst manchmal an Vertrautem fest, obwohl es nicht mehr lebendig ist. Lerne, auch loszulassen.",liebe:"In der Liebe bist du treu, sinnlich und beständig – du liebst mit Haut und Herz. Du brauchst Sicherheit und Berührung; Eifersucht darfst du in Vertrauen verwandeln.",beruf:"Du glänzt in Bereichen mit Beständigkeit, Ästhetik und Wert – Finanzen, Gestaltung, Gastronomie, Handwerk, alles Sinnliche und Solide.",wachstumText:"Dein Wachstum liegt in Flexibilität und Loslassen. Erlaube dir Veränderung – nicht alles Sichere ist auch lebendig.",elementText:"Als Erdzeichen lebst du von Verlässlichkeit, Sinnlichkeit und Geduld – du brauchst festen Boden, um zu gedeihen.",planetText:"Deine Herrscherin Venus schenkt dir Liebe zur Schönheit, Genuss und ein warmes Herz für alles Sinnliche.",tipp:"Frag dich ab und zu: Halte ich das hier, weil es mich nährt – oder nur, weil es vertraut ist?"},
  {id:"zwi",name:"Zwillinge",sym:"&#9802;",von:[5,21],bis:[6,20],element:"Luft",planet:"Merkur",keys:"Neugier · Austausch · Leichtigkeit",staerke:"Dein Geist ist schnell und verbindet Welten. Du bringst Menschen ins Gespräch.",wachstum:"Übe Tiefe – nicht jede Frage braucht sofort die nächste.",affirm:"Ich darf neugierig sein und trotzdem ankommen.",essenz:"Zwillinge ist das Zeichen des Geistes, der Sprache und der Neugier. Du bist hier, um zu lernen, zu verbinden und Ideen zwischen Menschen fließen zu lassen – ewig jung und wissbegierig.",staerken:"Du bist schlagfertig, kommunikativ, vielseitig und geistig flink. Du verbindest Welten, knüpfst leicht Kontakte und begeisterst dich für tausend Themen. Dein Witz öffnet Türen.",schatten:"Deine Vielseitigkeit kann zu Oberflächlichkeit, Unverbindlichkeit oder Zerstreuung werden. Du springst von Reiz zu Reiz und meidest manchmal die Tiefe. Lerne, auch zu bleiben.",liebe:"In der Liebe bist du verspielt, anregend und brauchst geistige Verbindung. Ohne Gespräch und Abwechslung wird dir schnell langweilig; suche Tiefe, die nicht einengt.",beruf:"Du blühst überall auf, wo Kommunikation, Information und Vielfalt zählen – Medien, Handel, Lehre, Schreiben, alles mit Worten und Menschen.",wachstumText:"Dein Wachstum liegt in Tiefe und Fokus. Nicht jede Frage braucht sofort die nächste – manches will in Ruhe verstanden werden.",elementText:"Als Luftzeichen lebst du vom Denken, vom Austausch und von Ideen – du brauchst geistige Bewegung wie andere Luft zum Atmen.",planetText:"Dein Herrscher Merkur schenkt dir Schnelligkeit im Denken, Sprachgewandtheit und eine flinke, neugierige Auffassung.",tipp:"Wähle heute ein Thema und bleib eine Weile dabei. In der Tiefe wartet eine andere Art Freude."},
  {id:"kre",name:"Krebs",sym:"&#9803;",von:[6,21],bis:[7,22],element:"Wasser",planet:"Mond",keys:"Fürsorge · Gefühl · Geborgenheit",staerke:"Du fühlst tief und schenkst anderen ein Zuhause.",wachstum:"Setze auch dir selbst liebevolle Grenzen.",affirm:"Ich darf fühlen und mich gleichzeitig schützen.",essenz:"Krebs ist das Zeichen des Gefühls, der Fürsorge und des Zuhauses. Du bist hier, um zu nähren, zu schützen und emotionale Geborgenheit zu schaffen – mit einem Herzen, das tief fühlt.",staerken:"Du bist einfühlsam, fürsorglich, treu und intuitiv. Du schenkst anderen ein Zuhause und spürst, was sie brauchen. Deine emotionale Tiefe ist ein Geschenk.",schatten:"Deine Sensibilität kann zu Rückzug, Anhänglichkeit oder Launenhaftigkeit werden. Du ziehst dich ins Schneckenhaus zurück, wenn du verletzt bist. Lerne, dich auch zu öffnen.",liebe:"In der Liebe bist du hingebungsvoll, schützend und tief verbunden. Du brauchst Sicherheit und Zärtlichkeit; achte darauf, dich nicht in der Fürsorge zu verlieren.",beruf:"Du glänzt in nährenden, schützenden Feldern – Pflege, Erziehung, Gastronomie, Immobilien, alles rund um Zuhause und Geborgenheit.",wachstumText:"Dein Wachstum liegt darin, dir selbst liebevolle Grenzen zu setzen und nicht jede Stimmung zur Wahrheit zu machen.",elementText:"Als Wasserzeichen lebst du vom Gefühl, von der Intuition und der Verbindung – du nimmst die Welt durch dein Herz wahr.",planetText:"Dein Herrscher, der Mond, schenkt dir Gespür für Stimmungen, einen reichen Innenraum und einen Rhythmus von Ebbe und Flut.",tipp:"Wenn du dich zurückziehst, frag dich sanft: Schütze ich mich – oder verstecke ich mich?"},
  {id:"loe",name:"Löwe",sym:"&#9804;",von:[7,23],bis:[8,22],element:"Feuer",planet:"Sonne",keys:"Strahlkraft · Herz · Großzügigkeit",staerke:"Du wärmst Räume und inspirierst durch dein offenes Herz.",wachstum:"Dein Wert hängt nicht an Applaus – du leuchtest auch leise.",affirm:"Ich darf strahlen, einfach weil ich bin.",essenz:"Löwe ist das Zeichen des Herzens, der Strahlkraft und der schöpferischen Lebensfreude. Du bist hier, um zu leuchten, zu wärmen und großzügig zu lieben – mit königlicher Würde.",staerken:"Du bist warmherzig, großzügig, mutig und voller Lebensfreude. Du inspirierst durch dein offenes Herz und deine natürliche Ausstrahlung. Du gibst gern und feierst das Leben.",schatten:"Deine Strahlkraft kann zu Stolz, Geltungsdrang oder Dramatik werden. Du hängst manchmal zu sehr an Applaus und Anerkennung. Lerne, auch leise zu leuchten.",liebe:"In der Liebe bist du leidenschaftlich, treu und großzügig – du liebst von Herzen und willst gefeiert werden. Schenke Bewunderung ebenso, wie du sie ersehnst.",beruf:"Du blühst auf der Bühne des Lebens auf – Führung, Kunst, Unterhaltung, Lehre, alles, wo Herz und Ausdruck gefragt sind.",wachstumText:"Dein Wachstum liegt in der Erkenntnis, dass dein Wert nicht am Applaus hängt. Du leuchtest auch dann, wenn niemand zusieht.",elementText:"Als Feuerzeichen lebst du von Begeisterung, Schöpferkraft und Herz – du brauchst Ausdruck, um dich lebendig zu fühlen.",planetText:"Dein Herrscher, die Sonne, schenkt dir Strahlkraft, ein großes Herz und das natürliche Bedürfnis, zu leuchten und Wärme zu geben.",tipp:"Schenke heute jemandem aufrichtige Bewunderung. Großzügigkeit des Herzens macht dich am hellsten."},
  {id:"jun",name:"Jungfrau",sym:"&#9805;",von:[8,23],bis:[9,22],element:"Erde",planet:"Merkur",keys:"Klarheit · Hingabe · Sorgfalt",staerke:"Du siehst, was andere übersehen, und bringst Ordnung ins Chaos.",wachstum:"Auch unperfekt ist genug – sei sanfter mit dir.",affirm:"Ich darf Fehler machen und bleibe wertvoll.",essenz:"Jungfrau ist das Zeichen der Klarheit, der Sorgfalt und des Dienens. Du bist hier, um zu ordnen, zu verfeinern und mit Hingabe zu helfen – mit einem scharfen Blick fürs Wesentliche.",staerken:"Du bist gewissenhaft, klug, hilfsbereit und detailgenau. Du siehst, was andere übersehen, und bringst Ordnung ins Chaos. Deine Verlässlichkeit und Bescheidenheit sind ein Segen.",schatten:"Dein Streben nach Vollkommenheit kann zu Selbstkritik, Sorge oder Pedanterie werden. Du bist oft am härtesten zu dir selbst. Lerne, dass auch unperfekt genug ist.",liebe:"In der Liebe bist du treu, fürsorglich und zeigst Liebe durch Taten. Du brauchst einen Partner, der deine stille Hingabe sieht; sei dabei sanfter mit dir und ihm.",beruf:"Du glänzt überall, wo Genauigkeit, Analyse und Dienst zählen – Gesundheit, Forschung, Organisation, Handwerk, alles Sorgfältige.",wachstumText:"Dein Wachstum liegt in Selbstmitgefühl. Sei sanfter mit dir – Fehler machen dich nicht weniger wertvoll.",elementText:"Als Erdzeichen lebst du von Klarheit, Nützlichkeit und Bodenständigkeit – du willst Sinnvolles greifbar machen.",planetText:"Dein Herrscher Merkur schenkt dir einen klaren, analytischen Verstand und die Gabe, Ordnung und Bedeutung zu erkennen.",tipp:"Sag dir heute einmal: Ich bin genug, auch ohne perfekt zu sein. Und atme."},
  {id:"waa",name:"Waage",sym:"&#9806;",von:[9,23],bis:[10,22],element:"Luft",planet:"Venus",keys:"Harmonie · Schönheit · Ausgleich",staerke:"Du schaffst Frieden und siehst beide Seiten.",wachstum:"Triff Entscheidungen für dich – nicht nur für die Harmonie.",affirm:"Ich darf wählen, was mir guttut.",essenz:"Waage ist das Zeichen der Harmonie, der Schönheit und der Beziehung. Du bist hier, um Ausgleich zu schaffen, Brücken zu bauen und Schönheit in die Welt zu bringen.",staerken:"Du bist diplomatisch, charmant, gerecht und ästhetisch begabt. Du siehst alle Seiten, schaffst Frieden und umgibst dich gern mit Schönheit. Deine Fairness verbindet Menschen.",schatten:"Deine Harmoniesucht kann zu Unentschlossenheit, Konfliktscheu oder Abhängigkeit von anderen werden. Du verlierst dich in der Frage, was andere wollen. Lerne, für dich zu wählen.",liebe:"In der Liebe bist du romantisch, partnerschaftlich und auf Augenhöhe – Beziehung ist dein Herzensthema. Achte darauf, dich nicht selbst zu vergessen, um Harmonie zu wahren.",beruf:"Du blühst in Bereichen mit Ästhetik, Vermittlung und Gerechtigkeit auf – Design, Recht, Beratung, Kunst, Diplomatie.",wachstumText:"Dein Wachstum liegt in Entschlossenheit. Triff Entscheidungen für dich – nicht nur für die Harmonie.",elementText:"Als Luftzeichen lebst du von Beziehung, Idee und Ausgleich – du denkst in Verbindungen und Balance.",planetText:"Deine Herrscherin Venus schenkt dir Liebe zur Schönheit, Charme und ein feines Gespür für Harmonie und Beziehung.",tipp:"Frag dich bei der nächsten Entscheidung zuerst: Was will ich? Erst danach, was passt."},
  {id:"sko",name:"Skorpion",sym:"&#9807;",von:[10,23],bis:[11,21],element:"Wasser",planet:"Pluto",keys:"Tiefe · Wandlung · Intensität",staerke:"Du gehst dorthin, wo es echt wird, und verwandelst Dunkles in Kraft.",wachstum:"Vertrauen darf wachsen – nicht alles ist Kontrolle.",affirm:"Ich darf mich wandeln und loslassen.",essenz:"Skorpion ist das Zeichen der Tiefe, der Wandlung und der Intensität. Du bist hier, um dorthin zu gehen, wo es echt wird – durch Dunkelheit zu Verwandlung und Kraft.",staerken:"Du bist tiefgründig, leidenschaftlich, mutig und durchdringend. Du erträgst, wovor andere fliehen, und verwandelst Schmerz in Stärke. Deine Loyalität und Intensität sind selten.",schatten:"Deine Tiefe kann zu Kontrolle, Eifersucht oder Misstrauen werden. Du hältst manchmal Groll fest und verschließt dich. Lerne, zu vertrauen und loszulassen.",liebe:"In der Liebe bist du leidenschaftlich, treu und ganz oder gar nicht. Du sehnst dich nach Verschmelzung; verwandle Kontrolle in Vertrauen, dann wird deine Liebe heilend.",beruf:"Du glänzt überall, wo Tiefe, Wandlung und Wahrheit zählen – Psychologie, Forschung, Heilkunst, Krisen, alles Verborgene.",wachstumText:"Dein Wachstum liegt im Vertrauen und Loslassen. Nicht alles ist Kontrolle – manches darf sich einfach wandeln.",elementText:"Als Wasserzeichen lebst du vom Gefühl, von Intuition und Tiefe – du spürst die Unterströmungen, die andere übersehen.",planetText:"Dein Herrscher Pluto schenkt dir die Kraft der Wandlung, Tiefe und die Fähigkeit, durch Krisen zu wachsen.",tipp:"Wo du festhältst, frag dich: Was würde geschehen, wenn ich loslasse? Oft folgt Erleichterung."},
  {id:"sch",name:"Schütze",sym:"&#9808;",von:[11,22],bis:[12,21],element:"Feuer",planet:"Jupiter",keys:"Freiheit · Weite · Sinn",staerke:"Du suchst Wahrheit und steckst andere mit Lebensfreude an.",wachstum:"Bleib auch mal – nicht jede Weite liegt in der Ferne.",affirm:"Ich folge meiner Sehnsucht nach Sinn.",essenz:"Schütze ist das Zeichen der Weite, der Wahrheit und des Sinns. Du bist hier, um zu suchen, zu wachsen und über Horizonte hinauszuschauen – mit ansteckender Lebensfreude.",staerken:"Du bist optimistisch, freiheitsliebend, ehrlich und voller Begeisterung. Du suchst Sinn, steckst andere mit Lebensfreude an und denkst in großen Zusammenhängen. Dein Vertrauen ins Leben ist ein Geschenk.",schatten:"Deine Weite kann zu Rastlosigkeit, Übertreibung oder Taktlosigkeit werden. Du versprichst mehr, als du hältst, und meidest das Kleingedruckte. Lerne, auch zu bleiben und zu vertiefen.",liebe:"In der Liebe brauchst du Freiheit, Abenteuer und einen Partner, der mit dir wächst. Verbindlichkeit ist kein Käfig – sie kann dein größtes Abenteuer sein.",beruf:"Du blühst in Bereichen mit Weite, Sinn und Bewegung auf – Reisen, Lehre, Philosophie, Verlag, alles, was Horizonte öffnet.",wachstumText:"Dein Wachstum liegt in Beständigkeit und Demut. Nicht jede Weite liegt in der Ferne – manche findest du, wenn du bleibst.",elementText:"Als Feuerzeichen lebst du von Begeisterung, Vision und Sinn – du brauchst ein Ziel am Horizont, um zu strahlen.",planetText:"Dein Herrscher Jupiter schenkt dir Optimismus, Weite, Glück und den Drang, zu wachsen und zu verstehen.",tipp:"Bevor du zum nächsten Horizont aufbrichst, würdige, was direkt vor dir liegt."},
  {id:"ste",name:"Steinbock",sym:"&#9809;",von:[12,22],bis:[1,19],element:"Erde",planet:"Saturn",keys:"Disziplin · Verantwortung · Geduld",staerke:"Du baust mit Geduld, was Bestand hat. Auf deine Schultern kann man bauen.",wachstum:"Erlaube dir Leichtigkeit – du musst nicht alles tragen.",affirm:"Ich darf streben und trotzdem ruhen.",essenz:"Steinbock ist das Zeichen der Disziplin, der Verantwortung und der Reife. Du bist hier, um zu bauen, zu meistern und mit Geduld zu erreichen, was Bestand hat.",staerken:"Du bist diszipliniert, verantwortungsvoll, geduldig und zielstrebig. Du baust mit Ausdauer, was andere nur erträumen, und trägst Lasten mit Würde. Auf dich kann man sich verlassen.",schatten:"Deine Strenge kann zu Härte gegen dich selbst, Pessimismus oder Verschlossenheit werden. Du arbeitest oft, statt zu leben. Lerne, dir Leichtigkeit und Freude zu erlauben.",liebe:"In der Liebe bist du treu, verlässlich und tief, zeigst Gefühle aber zurückhaltend. Du brauchst Vertrauen und Zeit; öffne dein Herz, dann bist du ein Fels voller Wärme.",beruf:"Du glänzt überall, wo Struktur, Ausdauer und Verantwortung zählen – Führung, Wirtschaft, Architektur, alles Langfristige und Solide.",wachstumText:"Dein Wachstum liegt in Leichtigkeit und Selbstgüte. Du musst nicht alles tragen – auch du darfst ruhen und genießen.",elementText:"Als Erdzeichen lebst du von Beständigkeit, Realismus und Geduld – du baust Schritt für Schritt, was bleibt.",planetText:"Dein Herrscher Saturn schenkt dir Disziplin, Reife und die Fähigkeit, durch Geduld und Verantwortung zu meistern.",tipp:"Plane diese Woche bewusst etwas ein, das nur der Freude dient. Auch das ist Verantwortung – für dich."},
  {id:"was",name:"Wassermann",sym:"&#9810;",von:[1,20],bis:[2,18],element:"Luft",planet:"Uranus",keys:"Freigeist · Vision · Menschlichkeit",staerke:"Du denkst voraus und stehst für das Andere, Neue, Gerechte.",wachstum:"Lass auch Nähe zu – nicht nur Ideen, auch Herzen.",affirm:"Ich darf anders sein und dazugehören.",essenz:"Wassermann ist das Zeichen des Freigeistes, der Vision und der Menschlichkeit. Du bist hier, um Neues zu denken, das Andere zu wagen und die Welt ein Stück gerechter zu machen.",staerken:"Du bist originell, unabhängig, fortschrittlich und menschlich. Du denkst voraus, stehst für das Gerechte und siehst Möglichkeiten, wo andere nur das Gewohnte sehen. Deine Freiheit inspiriert.",schatten:"Deine Unabhängigkeit kann zu Distanz, Sturheit oder emotionaler Kühle werden. Du flüchtest manchmal in Ideen, um Nähe zu meiden. Lerne, auch das Herz zu öffnen.",liebe:"In der Liebe bist du loyal, freiheitsliebend und brauchst geistige Verbindung und Raum. Lass auch echte Nähe zu – nicht nur Ideen, auch Herzen wollen sich begegnen.",beruf:"Du blühst in innovativen, sozialen oder technischen Feldern auf – Wissenschaft, Technik, soziale Projekte, alles Zukunftsweisende und Unkonventionelle.",wachstumText:"Dein Wachstum liegt in der Nähe. Lass Menschen an dein Herz – Verbundenheit ist kein Verlust deiner Freiheit.",elementText:"Als Luftzeichen lebst du von Ideen, Vision und Austausch – du denkst in Möglichkeiten und Zusammenhängen.",planetText:"Dein Herrscher Uranus schenkt dir Originalität, Erfindergeist und den Mut, anders und voraus zu sein.",tipp:"Teile heute ein Gefühl statt nur eines Gedankens. Nähe beginnt mit einem offenen Herzen."},
  {id:"fis",name:"Fische",sym:"&#9811;",von:[2,19],bis:[3,20],element:"Wasser",planet:"Neptun",keys:"Intuition · Mitgefühl · Traum",staerke:"Du spürst das Unsichtbare und schenkst grenzenloses Mitgefühl.",wachstum:"Erde dich – Träume brauchen auch Boden.",affirm:"Ich vertraue meiner Intuition und bleibe geerdet.",essenz:"Fische ist das letzte Zeichen des Tierkreises – das Zeichen der Intuition, des Mitgefühls und der Auflösung von Grenzen. Du bist hier, um zu fühlen, zu träumen und mit allem verbunden zu sein.",staerken:"Du bist mitfühlend, intuitiv, kreativ und tief empfindsam. Du spürst das Unsichtbare und schenkst grenzenloses Verständnis. Deine Fantasie und dein Herz kennen keine Mauern.",schatten:"Deine Durchlässigkeit kann zu Realitätsflucht, Selbstaufgabe oder Opferhaltung werden. Du verlierst leicht deine Grenzen und nimmst fremde Lasten auf. Lerne, dich zu erden und abzugrenzen.",liebe:"In der Liebe bist du hingebungsvoll, romantisch und verschmelzend. Du gibst grenzenlos; achte darauf, dich nicht zu verlieren und auch zu empfangen.",beruf:"Du blühst in künstlerischen, heilenden oder spirituellen Feldern auf – Kunst, Musik, Heilkunst, Seelsorge, alles Mitfühlende und Fantasievolle.",wachstumText:"Dein Wachstum liegt in Erdung und Grenzen. Träume brauchen auch Boden – und dein Mitgefühl braucht ein Ufer.",elementText:"Als Wasserzeichen lebst du vom Gefühl, von Intuition und Verbundenheit – du spürst, was zwischen den Menschen fließt.",planetText:"Dein Herrscher Neptun schenkt dir Intuition, Mitgefühl, Fantasie und die Sehnsucht nach dem Grenzenlosen.",tipp:"Erde dich täglich – barfuß, Atem, ein Glas Wasser. Geerdet wird dein Mitgefühl zur Heilkraft."}
];
const NUM_BEDEUTUNG={
  1:{titel:"Die Pionierin · Zahl 1",bedeutung:"Du bist hier, um zu führen und Neues zu beginnen. Unabhängigkeit und Mut sind dein Weg.",staerke:"Initiative, Willenskraft, Originalität.",essenz:"Die Eins ist der Anfang aller Dinge – der erste Funke, aus dem etwas entsteht. Als Lebenszahl 1 trägst du den Impuls in dir, eigene Wege zu gehen und Dinge ins Rollen zu bringen. Du bist nicht gemacht, um hinterherzulaufen, sondern um voranzugehen.",staerken:"Du besitzt Willenskraft, Mut und einen starken Eigenantrieb. Wo andere zögern, triffst du Entscheidungen und übernimmst Verantwortung. Deine Originalität und dein Pioniergeist inspirieren Menschen, die selbst nicht den ersten Schritt wagen.",herausforderung:"Deine Stärke kann zu Sturheit, Ungeduld oder Einzelgängertum werden. Manchmal fällt es dir schwer, um Hilfe zu bitten oder dich auf andere zu verlassen. Die Lektion der Eins ist, Führung mit Demut zu verbinden – stark zu sein, ohne hart zu werden.",liebe:"In Beziehungen brauchst du Freiraum und einen Partner auf Augenhöhe, der deine Selbstständigkeit achtet. Lerne, Schwäche zu zeigen und Nähe zuzulassen – wahre Stärke wagt auch Verletzlichkeit.",beruf:"Du blühst in Rollen auf, in denen du gestalten, gründen oder leiten kannst – als Unternehmerin, Pionierin, Selbstständige. Routine und enge Vorgaben rauben dir Energie.",lebensweg:"Dein Seelenweg ist, deinen eigenen Mut zu finden und ihm zu vertrauen, auch wenn niemand vorangeht. Du lernst, dass echte Unabhängigkeit nicht heißt, alles allein zu tun, sondern aus dir selbst heraus zu stehen.",tipp:"Wenn du feststeckst, frag dich: Was würde ich tun, wenn ich keine Angst vor dem Urteil anderer hätte? Und tu den ersten kleinen Schritt.",affirm:"Ich vertraue meiner Kraft, voranzugehen."},
  2:{titel:"Die Diplomatin · Zahl 2",bedeutung:"Dein Weg ist Verbindung. Du heilst durch Sensibilität, Geduld und Zusammenarbeit.",staerke:"Empathie, Harmonie, Intuition.",essenz:"Die Zwei steht für Beziehung, Gleichgewicht und das Dazwischen. Als 2 bist du die Brückenbauerin, die Gegensätze versöhnt und feine Zwischentöne wahrnimmt, die anderen entgehen. Deine Kraft liegt nicht im Lauten, sondern im Verbindenden.",staerken:"Du bist einfühlsam, geduldig und ein wunderbarer Zuhörer. Du spürst Stimmungen, bevor sie ausgesprochen werden, und schaffst Harmonie, wo Spannung herrscht. Im Team bist du oft das Herz, das alles zusammenhält.",herausforderung:"Deine Feinfühligkeit kann zu Selbstaufgabe, Abhängigkeit von Bestätigung oder Konfliktscheu werden. Du stellst eigene Bedürfnisse oft hinten an. Deine Lektion ist, sanft zu bleiben und trotzdem für dich einzustehen.",liebe:"In der Liebe bist du hingebungsvoll, treu und tief verbunden. Achte darauf, dich nicht in der anderen Person zu verlieren – auch du darfst genährt werden, nicht nur nähren.",beruf:"Du glänzt in Rollen, die Vermittlung, Fürsorge und Feingefühl verlangen – Beratung, Heilberufe, Kunst, Teamarbeit. Ellenbogen-Konkurrenz liegt dir nicht.",lebensweg:"Dein Seelenweg ist, deine Sensibilität als Gabe zu sehen, nicht als Schwäche – und Frieden zu stiften, ohne dich selbst zu verleugnen.",tipp:"Übe das liebevolle Nein. Jedes Mal, wenn du dir treu bleibst, stärkst du deinen Selbstwert.",affirm:"Ich darf sanft sein – darin liegt meine Stärke."},
  3:{titel:"Die Schöpferin · Zahl 3",bedeutung:"Ausdruck ist deine Sprache. Du bringst Freude, Kreativität und Leichtigkeit in die Welt.",staerke:"Kreativität, Kommunikation, Optimismus.",essenz:"Die Drei ist die Zahl der schöpferischen Freude, der Kommunikation und des Spiels. Als 3 bist du hier, um dich auszudrücken – in Worten, Bildern, Lachen, Kunst. Lebensfreude ist nicht oberflächlich für dich, sondern dein eigentliches Geschenk.",staerken:"Du bist kreativ, charmant und ansteckend optimistisch. Du findest Worte, die berühren, und bringst Leichtigkeit in schwere Räume. Deine Fantasie kennt kaum Grenzen.",herausforderung:"Deine Energie kann sich verzetteln – viele Anfänge, wenige Abschlüsse. Oberflächlichkeit, Selbstzweifel hinter der heiteren Maske oder Zerstreuung sind deine Schatten. Deine Lektion ist Fokus und der Mut, dich auch verletzlich zu zeigen.",liebe:"In Beziehungen bist du spielerisch, herzlich und ausdrucksstark. Du brauchst einen Partner, der deine Leichtigkeit teilt und dir Raum für Kreativität lässt, aber auch echte Tiefe sucht.",beruf:"Du blühst überall auf, wo Ausdruck gefragt ist – Schreiben, Bühne, Design, Lehre, Medien. Trockene Routine erstickt dein Feuer.",lebensweg:"Dein Seelenweg ist, deine Stimme zu finden und dich zu zeigen, auch wenn es Mut kostet. Du lernst, dass deine Freude ein Geschenk an die Welt ist.",tipp:"Bring eine kreative Sache zu Ende, bevor du die nächste beginnst – Vollendung verwandelt Talent in Erfüllung.",affirm:"Ich teile meine Freude und mein Licht."},
  4:{titel:"Die Baumeisterin · Zahl 4",bedeutung:"Du schaffst Fundamente. Mit Fleiß und Beständigkeit machst du Träume tragfähig.",staerke:"Stabilität, Disziplin, Verlässlichkeit.",essenz:"Die Vier ist die Zahl der Ordnung, des Fundaments und der Beständigkeit. Als 4 bist du die, auf die man bauen kann – verlässlich, geduldig, gründlich. Du verwandelst Ideen in tragfähige Wirklichkeit.",staerken:"Du bist diszipliniert, ehrlich und ausdauernd. Wo andere aufgeben, bleibst du dran und schaffst Strukturen, die halten. Deine Treue und dein Verantwortungssinn sind ein Fels für deine Umgebung.",herausforderung:"Deine Liebe zur Ordnung kann zu Starrheit, Kontrolle oder Angst vor Veränderung werden. Du arbeitest manchmal mehr, als du lebst. Deine Lektion ist, Halt zu geben und trotzdem flexibel und leicht zu bleiben.",liebe:"In der Liebe bist du treu, fürsorglich und beständig – du baust ein sicheres Zuhause. Achte darauf, neben Pflicht auch Spontaneität und Zärtlichkeit zuzulassen.",beruf:"Du glänzt überall, wo Genauigkeit, Aufbau und Verlässlichkeit zählen – Handwerk, Organisation, Finanzen, Planung. Chaos und ständiger Wandel zehren an dir.",lebensweg:"Dein Seelenweg ist, etwas Bleibendes zu schaffen und dabei zu lernen, dass auch du dir Pausen und Leichtigkeit erlauben darfst.",tipp:"Plane bewusst Zeit für nichts ein. In der Pause sammelst du Kraft für das, was du baust.",affirm:"Schritt für Schritt baue ich, was bleibt."},
  5:{titel:"Die Abenteurerin · Zahl 5",bedeutung:"Freiheit und Wandel sind dein Element. Du lebst durch Erfahrung und Bewegung.",staerke:"Anpassung, Mut, Lebenslust.",essenz:"Die Fünf ist die Zahl der Freiheit, der Sinne und der Veränderung. Als 5 bist du neugierig, lebenshungrig und nie lange am selben Ort. Du lernst das Leben nicht aus Büchern, sondern indem du es erlebst.",staerken:"Du bist anpassungsfähig, mutig und voller Lebenslust. Du begeisterst dich schnell, knüpfst leicht Kontakte und bringst frischen Wind in jede Situation. Veränderung macht dir keine Angst – sie nährt dich.",herausforderung:"Deine Freiheitsliebe kann zu Unruhe, Bindungsangst oder Maßlosigkeit werden. Du beginnst vieles und springst weiter, bevor es Wurzeln schlägt. Deine Lektion ist, Freiheit von innen zu finden – nicht in ständiger Flucht.",liebe:"In Beziehungen brauchst du Raum, Abwechslung und einen Partner, der mit dir wächst statt dich einzuengen. Lerne, dass echte Nähe keine Gefangenschaft ist.",beruf:"Du blühst in abwechslungsreichen, freien Tätigkeiten auf – Reisen, Vertrieb, Medien, alles mit Menschen und Bewegung. Enge Käfige und Monotonie ersticken dich.",lebensweg:"Dein Seelenweg ist, Freiheit mit Verantwortung zu verbinden – wild zu bleiben und dennoch verbindlich zu sein.",tipp:"Bevor du weiterziehst, frag dich: Renne ich auf etwas zu – oder vor etwas weg?",affirm:"Ich umarme den Wandel als meinen Lehrer."},
  6:{titel:"Die Fürsorgliche · Zahl 6",bedeutung:"Liebe und Verantwortung führen dich. Du nährst, schützt und schaffst Schönheit.",staerke:"Hingabe, Wärme, Harmonie.",essenz:"Die Sechs ist die Zahl der Liebe, der Familie und der Verantwortung. Als 6 bist du die Hüterin von Herz und Heim, die sich um andere kümmert und Schönheit in den Alltag bringt. Harmonie ist dein Lebenselixier.",staerken:"Du bist warmherzig, loyal und fürsorglich. Menschen fühlen sich bei dir geborgen und gesehen. Du hast einen Sinn für Ästhetik und schaffst Räume, in denen man sich zuhause fühlt.",herausforderung:"Deine Fürsorge kann zu Aufopferung, Perfektionismus oder dem Wunsch, andere zu kontrollieren, kippen. Du kümmerst dich um alle – nur nicht um dich. Deine Lektion ist, auch dir selbst die Liebe zu geben, die du verschenkst.",liebe:"In der Liebe bist du hingebungsvoll, treu und nährend – Beziehung ist dein Herzensthema. Achte darauf, nicht aus Pflicht zu lieben und Geben und Nehmen im Gleichgewicht zu halten.",beruf:"Du glänzt in helfenden, gestaltenden Berufen – Pflege, Erziehung, Beratung, Innenarchitektur, alles rund um Menschen und Schönheit.",lebensweg:"Dein Seelenweg ist, bedingungslos zu lieben, ohne dich dabei zu verlieren – und Verantwortung zu tragen, ohne sie zur Last werden zu lassen.",tipp:"Frag dich täglich einmal: Was brauche ich gerade? Und schenke es dir mit derselben Selbstverständlichkeit wie anderen.",affirm:"Ich gebe Liebe und empfange sie ebenso."},
  7:{titel:"Die Suchende · Zahl 7",bedeutung:"Du gehst nach innen. Weisheit, Spiritualität und Wahrheit sind dein Pfad.",staerke:"Tiefe, Intuition, Erkenntnis.",essenz:"Die Sieben ist die Zahl der Weisheit, der Spiritualität und der inneren Suche. Als 7 bist du eine Denkerin und Fühlerin, die hinter die Oberfläche schauen will. Du brauchst Stille, um zu dir zu finden.",staerken:"Du bist tiefgründig, analytisch und intuitiv zugleich. Du stellst die Fragen, die andere überspringen, und findest Wahrheit, wo andere nur Meinungen sehen. Deine innere Welt ist reich.",herausforderung:"Dein Hang zur Tiefe kann zu Rückzug, Misstrauen oder Grübeln werden. Du fühlst dich oft missverstanden oder allein. Deine Lektion ist, deine Weisheit zu teilen und Menschen an dich heranzulassen.",liebe:"In Beziehungen brauchst du Tiefe, Raum für dich und einen Partner, der deine stille Seite achtet. Öffne dich – Nähe ist kein Verlust deiner Unabhängigkeit.",beruf:"Du blühst in forschenden, analytischen oder spirituellen Feldern auf – Wissenschaft, Psychologie, Philosophie, Heilkunst. Lauter Trubel laugt dich aus.",lebensweg:"Dein Seelenweg ist, innere Wahrheit zu suchen und schließlich zu vertrauen, dass du nicht alles wissen musst – manches darf gefühlt und geglaubt werden.",tipp:"Plane täglich Stille ein. In der Ruhe findest du die Antworten, die der Lärm verdeckt.",affirm:"In der Stille finde ich meine Antworten."},
  8:{titel:"Die Macherin · Zahl 8",bedeutung:"Fülle und Kraft sind dein Feld. Du manifestierst im Außen, was du innen weißt.",staerke:"Führung, Manifestation, Ausdauer.",essenz:"Die Acht ist die Zahl der Kraft, der Fülle und der Manifestation. Als 8 trägst du das Potenzial, Großes im Außen zu bewirken – Erfolg, Wohlstand, Wirkung. Du verstehst die Gesetze von Geben und Nehmen, Ursache und Wirkung.",staerken:"Du bist zielstrebig, belastbar und ein geborener Manager. Du denkst groß, packst an und bringst Visionen in die materielle Welt. Verantwortung und Macht schrecken dich nicht.",herausforderung:"Dein Streben kann zu Kontrollsucht, Arbeitswut oder dem Gefühl führen, nie genug zu haben. Du verwechselst manchmal Wert mit Leistung. Deine Lektion ist, Erfolg und innere Fülle zu verbinden.",liebe:"In der Liebe bist du schützend, großzügig und loyal, brauchst aber einen Partner auf Augenhöhe. Achte darauf, im Privaten die Kontrolle loszulassen und weich zu sein.",beruf:"Du glänzt in Führung, Wirtschaft, Unternehmertum und überall, wo Wirkung und Verantwortung zählen. Kleinteilige Unterordnung passt selten zu dir.",lebensweg:"Dein Seelenweg ist, deine Kraft im Dienst von etwas Größerem zu nutzen – und zu erkennen, dass dein Wert nicht von deinem Erfolg abhängt.",tipp:"Definiere Reichtum neu: Zeit, Liebe, Gesundheit gehören dazu. Erfolg ohne Erfüllung ist nur halbe Fülle.",affirm:"Ich darf Fülle empfangen und gestalten."},
  9:{titel:"Die Humanistin · Zahl 9",bedeutung:"Mitgefühl und Vollendung prägen dich. Du dienst dem Größeren und lässt los.",staerke:"Großzügigkeit, Weisheit, Vergebung.",essenz:"Die Neun ist die Zahl der Vollendung, des Mitgefühls und der Weisheit aller vorherigen Zahlen. Als 9 trägst du ein weites Herz und einen Blick fürs große Ganze. Du bist hier, um zu geben und loszulassen.",staerken:"Du bist großzügig, idealistisch und tief mitfühlend. Du siehst das Menschliche in jedem und setzt dich für mehr ein als für dich selbst. Deine Weisheit reicht über das Eigene hinaus.",herausforderung:"Dein Idealismus kann zu Enttäuschung, Selbstaufgabe oder dem Festhalten an Schmerz werden. Du gibst, bis du leer bist. Deine Lektion ist Loslassen – Menschen, Groll, alte Geschichten – um frei zu werden.",liebe:"In der Liebe bist du hingebungsvoll und großherzig, neigst aber dazu, retten zu wollen. Lerne, auf Augenhöhe zu lieben und auch zu empfangen.",beruf:"Du blühst in sozialen, künstlerischen oder heilenden Feldern auf – überall, wo du Menschen dienen und die Welt ein Stück besser machen kannst.",lebensweg:"Dein Seelenweg ist, mit offenem Herzen zu geben und gleichzeitig loszulassen – zu dienen, ohne dich aufzulösen.",tipp:"Übe das Loslassen bewusst: Was du heute gehen lässt, schafft Raum für das Neue.",affirm:"Ich öffne mein Herz für die ganze Welt."},
  11:{titel:"Die Inspiratorin · Meisterzahl 11",bedeutung:"Hohe Intuition und Inspiration. Du bist ein Kanal für Licht – sensibel und visionär.",staerke:"Erleuchtung, Intuition, Inspiration.",essenz:"Die Elf ist die erste Meisterzahl – die erhöhte Schwingung der 2. Als 11 trägst du außergewöhnliche Intuition und die Gabe, andere zu inspirieren und zu erheben. Du spürst, was zwischen den Welten liegt.",staerken:"Du bist hochsensibel, visionär und spirituell begabt. Du erfasst Zusammenhänge blitzartig und kannst Menschen durch deine bloße Präsenz berühren. Inspiration fließt durch dich.",herausforderung:"Deine hohe Schwingung bringt auch Nervosität, Selbstzweifel und das Gefühl, zu viel zu fühlen. Du schwankst zwischen Erleuchtung und Überforderung. Deine Lektion ist Erdung – deine Gabe braucht festen Boden.",liebe:"In Beziehungen bist du tief verbunden und feinfühlig, brauchst aber einen Partner, der deine Sensibilität versteht. Achte auf gesunde Grenzen, um nicht überflutet zu werden.",beruf:"Du blühst in inspirierenden, spirituellen oder kreativen Feldern auf – Lehre, Heilkunst, Kunst, alles, was Menschen erhebt.",lebensweg:"Dein Seelenweg ist, deiner Intuition zu vertrauen und dein Licht zu teilen, ohne dich darin zu verlieren – Vision und Erdung zu vereinen.",tipp:"Erde dich täglich: Atem, Natur, Bewegung. Geerdet wird deine Sensibilität zur Superkraft.",affirm:"Ich vertraue meiner inneren Stimme vollkommen."},
  22:{titel:"Die Visionärin · Meisterzahl 22",bedeutung:"Die Meister-Baumeisterin: Du kannst große Visionen in die Realität bringen.",staerke:"Vision, Manifestation, Wirkung.",essenz:"Die Zweiundzwanzig ist die mächtigste Meisterzahl – die erhöhte 4. Als 22 verbindest du große Vision mit der Fähigkeit, sie konkret zu verwirklichen. Du kannst Bleibendes für viele Menschen schaffen.",staerken:"Du bist visionär und praktisch zugleich – ein seltener Mix aus Träumer und Macher. Du denkst in großen Maßstäben und hast die Disziplin, sie umzusetzen. Dein Wirken kann weit über dich hinausreichen.",herausforderung:"Das Potenzial der 22 kann lähmen – die Angst vor der eigenen Größe oder der Druck, etwas Bedeutendes leisten zu müssen. Deine Lektion ist, Schritt für Schritt zu gehen und dem Prozess zu vertrauen.",liebe:"In der Liebe bist du verlässlich und tief, aber oft in deine Mission vertieft. Achte darauf, Nähe und Gegenwart nicht der Vision zu opfern.",beruf:"Du glänzt überall, wo Vision und Aufbau zusammenkommen – große Projekte, Gründungen, Institutionen, alles mit langfristiger Wirkung.",lebensweg:"Dein Seelenweg ist, deine große Vision zu wagen und dabei demütig und geerdet zu bleiben – im Dienst von etwas, das größer ist als du.",tipp:"Teile dein großes Ziel in kleine Schritte. Jeder Stein zählt für das Haus, das du baust.",affirm:"Ich verwandle große Träume in Wirklichkeit."},
  33:{titel:"Die Heilerin · Meisterzahl 33",bedeutung:"Der Meister-Lehrer: bedingungslose Liebe und Heilung im Dienst aller.",staerke:"Heilung, Hingabe, Mitgefühl.",essenz:"Die Dreiunddreißig ist die höchste Meisterzahl – die Schwingung der bedingungslosen Liebe und des Mitgefühls. Als 33 bist du hier, um zu heilen, zu lehren und durch dein bloßes Sein Licht zu bringen.",staerken:"Du bist zutiefst mitfühlend, weise und nährend. Du hebst andere durch deine Liebe und deinen Dienst. In dir vereinen sich der Ausdruck der 3 und die Fürsorge der 6 zu reiner Hingabe.",herausforderung:"Die hohe Verantwortung kann zu Selbstaufopferung, Märtyrertum oder Überforderung führen. Du nimmst die Last der Welt auf dich. Deine Lektion ist, aus Fülle zu geben statt aus Pflicht – und auch dich heilen zu lassen.",liebe:"In der Liebe bist du grenzenlos großzügig und warmherzig. Achte sorgsam auf deine eigenen Grenzen, damit deine Liebe nicht zur Selbstaufgabe wird.",beruf:"Du blühst in heilenden, lehrenden, dienenden Feldern auf – überall, wo Mitgefühl Menschen erhebt.",lebensweg:"Dein Seelenweg ist, bedingungslose Liebe zu leben, ohne dich zu verlieren – zu dienen aus einem vollen, nicht aus einem leeren Herzen.",tipp:"Fülle zuerst deinen eigenen Becher. Nur ein genährtes Herz kann dauerhaft nähren.",affirm:"Ich diene aus Liebe und heile durch mein Sein."}
};
const MANI_METHODEN=[
  {id:"m369",titel:"Die 369-Methode",dauer:"Täglich",beschreibung:"Schreibe deinen Wunsch dreimal morgens, sechsmal mittags, neunmal abends.",steps:["Formuliere deinen Wunsch positiv und im Präsens (als wäre er schon da).","Schreibe ihn morgens 3-mal mit Gefühl auf.","Mittags schreibe ihn 6-mal.","Abends schreibe ihn 9-mal.","Spüre dabei jedes Mal, wie es sich anfühlt, dass es wahr ist.","Wiederhole es über mehrere Tage."],schluss:"Die Zahlen 3-6-9 bündeln deine Absicht und richten dich täglich neu aus."},
  {id:"mskript",titel:"Skripting",dauer:"10 Min",beschreibung:"Schreibe dein Wunschleben im Präsens, als würdest du es heute schon leben.",steps:["Nimm dir ein ruhiges Blatt und Zeit.","Schreibe in der Gegenwart: Ich bin … Ich habe … Ich fühle …","Beschreibe einen Tag in deinem Wunschleben in allen Details.","Fühle die Dankbarkeit, als wäre es bereits real.","Lies es dir mit Freude noch einmal vor."],schluss:"Dein Unterbewusstsein unterscheidet nicht zwischen lebhaft Vorgestelltem und Erlebtem."},
  {id:"mvis",titel:"Visualisierung",dauer:"5 Min",beschreibung:"Erlebe deinen Wunsch innerlich mit allen Sinnen.",steps:["Schließe die Augen und atme ruhig.","Stell dir vor, dein Wunsch ist erfüllt.","Was siehst du? Was hörst du? Was fühlst du auf der Haut?","Verweile in der Freude dieses Moments.","Lächle und öffne langsam die Augen."],schluss:"Was du regelmäßig fühlst, ziehst du in dein Leben."},
  {id:"mdank",titel:"Dankbarkeit im Voraus",dauer:"3 Min",beschreibung:"Danke für deinen Wunsch, als wäre er schon eingetroffen.",steps:["Lege eine Hand aufs Herz.","Sag: Danke, dass … (dein Wunsch) … in mein Leben gekommen ist.","Spüre die Wärme echter Dankbarkeit.","Wiederhole es für drei Wünsche."],schluss:"Dankbarkeit ist die Schwingung des Empfangens."},
  {id:"mspiegel",titel:"Spiegel-Affirmationen",dauer:"2 Min",beschreibung:"Sprich dir selbst in die Augen, was du werden möchtest.",steps:["Stell dich vor einen Spiegel.","Schau dir freundlich in die Augen.","Sprich deine Affirmation laut und mit Gefühl.","Wiederhole sie drei- bis fünfmal.","Lächle dir zum Abschluss zu."],schluss:"Niemand prägt dich so sehr wie deine eigene Stimme."},
  {id:"mloslass",titel:"Loslassen & Vertrauen",dauer:"5 Min",beschreibung:"Übergib deinen Wunsch und vertraue dem richtigen Timing.",steps:["Schreibe deinen Wunsch ein letztes Mal auf.","Sag: Ich gebe dies in größere Hände als meine.","Atme tief und lass die Anspannung los.","Vertraue, dass es zur richtigen Zeit kommt – oder etwas Besseres.","Geh in deinen Tag, leicht und offen."],schluss:"Festhalten verengt, Vertrauen öffnet. Das Loslassen vollendet die Manifestation."}
];

/* ===== WISSEN (Artikel) ===== */
const WISSEN=[
 {id:"w1",titel:"Was ist Manifestation?",intro:"Wie dein Inneres dein Außen formt.",absaetze:["Manifestation beschreibt die Idee, dass unsere Gedanken, Gefühle und unser Fokus beeinflussen, was wir in unser Leben ziehen. Der Kern ist nicht Magie, sondern Aufmerksamkeit: Worauf du dich richtest, das nimmt in deinem Leben mehr Raum ein.","Psychologisch lässt sich vieles erklären: Wer ein Ziel klar vor Augen hat, nimmt Chancen eher wahr, handelt mutiger und gibt nicht so schnell auf. Das Gefühl, es sei schon möglich, verändert das Verhalten – und Verhalten verändert Ergebnisse.","In der Praxis arbeitest du mit drei Zutaten: Klarheit (was genau willst du?), Gefühl (wie fühlt es sich an, es schon zu haben?) und Handlung (welcher kleine Schritt ist heute möglich?). Methoden wie die 369-Technik oder Skripting bündeln genau diese Ausrichtung.","Wichtig: Manifestation ersetzt kein Handeln und keine Geduld. Sie ist eine Einladung, dich auf das Gewünschte auszurichten – und dann dem Leben zu vertrauen."]},
 {id:"w2",titel:"Wie funktionieren Mondphasen?",intro:"Der 29-Tage-Rhythmus am Himmel.",absaetze:["Der Mond leuchtet nicht selbst – wir sehen den Teil, den die Sonne beleuchtet. Während er die Erde umkreist, ändert sich dieser Winkel, und so entstehen die acht Mondphasen.","Ein voller Zyklus von Neumond zu Neumond dauert etwa 29,5 Tage. Bei Neumond steht der Mond zwischen Erde und Sonne – wir sehen ihn kaum. Bei Vollmond steht die Erde dazwischen, die ganze sichtbare Seite leuchtet.","Viele Menschen nutzen diesen Rhythmus als natürlichen Taktgeber: Neumond als Zeit für Absichten und Neuanfänge, die zunehmende Phase für Aufbau und Handlung, Vollmond für Fülle und Loslassen, die abnehmende Phase für Ruhe und Reflexion.","Du musst nicht an eine Wirkung glauben, um davon zu profitieren. Allein der Rhythmus gibt dem Monat Struktur – ein sanfter Anker, um regelmäßig innezuhalten."]},
 {id:"w3",titel:"Grundlagen der Astrologie",intro:"Sternzeichen, Elemente und was sie bedeuten.",absaetze:["Astrologie deutet die Positionen von Sonne, Mond und Planeten zu einem bestimmten Zeitpunkt – meist deiner Geburt. Das bekannteste ist dein Sonnenzeichen: das Sternzeichen, in dem die Sonne bei deiner Geburt stand.","Die zwölf Zeichen teilen sich in vier Elemente: Feuer (Widder, Löwe, Schütze) steht für Tatkraft, Erde (Stier, Jungfrau, Steinbock) für Bodenständigkeit, Luft (Zwillinge, Waage, Wassermann) für Geist und Austausch, Wasser (Krebs, Skorpion, Fische) für Gefühl und Intuition.","Dein Sonnenzeichen beschreibt deine Grundenergie – aber ein vollständiges Horoskop umfasst viel mehr: Mondzeichen (deine Gefühlswelt), Aszendent (dein Auftreten) und die Stellung aller Planeten.","Astrologie ist kein festes Schicksal, sondern eine Sprache der Selbstreflexion. Sie lädt dich ein, dich selbst mit mehr Mitgefühl und Neugier zu betrachten."]},
 {id:"w4",titel:"Was ist Numerologie?",intro:"Die Bedeutung deiner Lebenszahl.",absaetze:["Numerologie geht davon aus, dass Zahlen eine Bedeutung tragen. Die wichtigste ist die Lebenszahl, die aus deinem Geburtsdatum berechnet wird – sie soll deinen Lebensweg und deine Kernthemen beschreiben.","So rechnest du: Addiere alle Ziffern deines Geburtsdatums und reduziere die Summe, bis eine einzelne Ziffer bleibt. Beispiel: 15.07.1990 → 1+5+0+7+1+9+9+0 = 32 → 3+2 = 5. Deine Lebenszahl wäre die 5.","Eine Ausnahme sind die Meisterzahlen 11, 22 und 33 – sie werden nicht weiter reduziert, weil ihnen eine besonders hohe Schwingung zugeschrieben wird.","Jede Zahl von 1 bis 9 hat eine Charakteristik – von der Führungskraft der 1 bis zur Mitmenschlichkeit der 9. Numerologie ist ein Spiegel, der dir helfen kann, deine Stärken klarer zu sehen."]},
 {id:"w5",titel:"Die 7 Chakren verstehen",intro:"Die Energiezentren von Wurzel bis Krone.",absaetze:["Das Chakren-System stammt aus den jahrtausendealten yogischen Traditionen Indiens. Chakra bedeutet Rad – gemeint sind sieben Energiezentren entlang der Wirbelsäule, die jeweils für ein Lebensthema stehen.","Von unten nach oben: Wurzel (Sicherheit), Sakral (Lust & Kreativität), Solarplexus (Wille & Selbstwert), Herz (Liebe), Hals (Ausdruck), Stirn (Intuition) und Krone (Spiritualität).","Die Idee: Ist ein Zentrum im Fluss, fühlt sich das entsprechende Lebensthema leicht an. Ist es blockiert, zeigen sich Themen wie Angst, Selbstzweifel oder Verschlossenheit. Übungen, Atem, Farben und Affirmationen sollen helfen, die Zentren auszugleichen.","Du kannst das Chakren-System als Landkarte deiner inneren Themen nutzen – ein hilfreiches Bild, um zu spüren, wo du gerade Aufmerksamkeit brauchst."]},
 {id:"w6",titel:"Meditation für Anfänger",intro:"Einfach anfangen – ohne es richtig machen zu müssen.",absaetze:["Meditation ist kein Leeren des Kopfes. Es ist das Üben, immer wieder sanft zurückzukehren – zum Atem, zum Moment, zu dir. Gedanken kommen immer; das Zurückkehren ist die eigentliche Übung.","So fängst du an: Setz dich bequem hin, schließe die Augen, atme natürlich. Lenke die Aufmerksamkeit auf den Atem. Wenn du merkst, dass du abgeschweift bist – und das wirst du oft – komm freundlich zurück. Das ist kein Versagen, das ist Meditation.","Schon zwei bis fünf Minuten täglich wirken. Regelmäßigkeit ist wichtiger als Länge. Lieber jeden Tag kurz als einmal lang.","Sei geduldig mit dir. Es gibt keine perfekte Meditation. Jeder Moment, in dem du da bist, ist genug."]},
 {id:"w7",titel:"Mit Affirmationen arbeiten",intro:"Wie Worte dein Inneres formen.",absaetze:["Affirmationen sind positive Sätze im Präsens, die du dir bewusst sagst, um dein Denken liebevoller auszurichten. Dein Gehirn glaubt mit der Zeit, was es oft hört – auch von der eigenen Stimme.","Damit sie wirken, sollten sie sich erreichbar anfühlen. Statt „Ich bin vollkommen angstfrei“ lieber „Ich lerne, mir selbst zu vertrauen“. Sätze, die du innerlich ablehnst, erzeugen Widerstand.","Wirksam wird eine Affirmation durch Wiederholung und Gefühl. Sprich sie morgens vor dem Spiegel, schreibe sie auf, oder lass sie als Tagesimpuls durch deinen Tag wandern.","Affirmationen sind kein Zaubertrick, sondern sanftes Umtrainieren deines inneren Tons – von Kritik hin zu Freundlichkeit."]},
 {id:"w8",titel:"Kristalle & ihre Energie",intro:"Was hinter den Steinen steckt.",absaetze:["Kristalle werden seit Jahrtausenden in vielen Kulturen für Heilung, Schutz und Rituale genutzt. Jeder Stein wird mit bestimmten Qualitäten verbunden – Rosenquarz mit Liebe, Amethyst mit Ruhe, Citrin mit Fülle.","Aus wissenschaftlicher Sicht ist eine direkte Wirkung nicht belegt. Ihr Wert liegt vor allem darin, dass sie als Anker und Erinnerung für deine Absicht dienen: Ein Stein in der Hand holt dich zurück zu dem, wofür er steht.","In der Praxis wählst du einen Stein nach deinem Thema, hältst ihn bei Meditation oder trägst ihn bei dir. Manche „reinigen“ ihre Steine mit Wasser, Mondlicht oder Selenit – ein Ritual, das vor allem die eigene Intention klärt.","Nimm Kristalle als das, was sie für dich sind: schöne, beständige Begleiter, die dich an deine innere Ausrichtung erinnern."]}
];

function searchAll(q){q=q.trim().toLowerCase();if(!q)return[];const r=[];
  INHALTE.forEach(i=>{if((i.titel+i.affirmation+i.thema+i.praxis).toLowerCase().includes(q))r.push({t:'Impuls',n:i.titel,fn:"openImpuls('"+i.id+"')"});});
  MEDITATIONEN.forEach(m=>{if((m.titel+m.thema+m.intro).toLowerCase().includes(q))r.push({t:'Meditation',n:m.titel,fn:"openMeditation('"+m.id+"')"});});
  RITUALE.forEach(x=>{if((x.titel+x.anlass).toLowerCase().includes(q))r.push({t:'Ritual',n:x.titel,fn:"openRitual('"+x.id+"')"});});
  STERNZEICHEN.forEach(z=>{if((z.name+z.keys+z.element).toLowerCase().includes(q))r.push({t:'Sternzeichen',n:z.name,fn:"openSign('"+z.id+"')"});});
  KRISTALLE.forEach(k=>{if((k.name+k.wirkung+k.chakra).toLowerCase().includes(q))r.push({t:'Kristall',n:k.name,fn:"openKristall('"+k.id+"')"});});
  KRAFTTIERE.forEach(t=>{if((t.name+t.thema+t.bedeutung).toLowerCase().includes(q))r.push({t:'Krafttier',n:t.name,fn:"openTier('"+t.id+"')"});});
  ENGELZAHLEN.forEach(e=>{if((e.zahl+e.titel).toLowerCase().includes(q))r.push({t:'Engelzahl',n:e.zahl+' · '+e.titel,fn:"openEngel('"+e.id+"')"});});
  CHAKREN.forEach(c=>{if((c.name+c.thema+c.skt).toLowerCase().includes(q))r.push({t:'Chakra',n:c.name,fn:"openChakra('"+c.id+"')"});});
  MANI_METHODEN.forEach(m=>{if((m.titel+m.beschreibung).toLowerCase().includes(q))r.push({t:'Methode',n:m.titel,fn:"openMethod('"+m.id+"')"});});
  WISSEN.forEach(w=>{if((w.titel+w.intro).toLowerCase().includes(q))r.push({t:'Wissen',n:w.titel,fn:"openWissen('"+w.id+"')"});});
  return r;}
